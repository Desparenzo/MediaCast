```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Global Compass | গ্লোবাল কম্পাস</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&family=Hind+Siliguri:wght@300;500;700&display=swap');
        
        body {
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 1rem;
        }

        .bn-text {
            font-size: 0.85em;
            opacity: 0.8;
            display: block;
            font-weight: 400;
        }

        .compass-container {
            position: relative;
            width: 280px;
            height: 280px;
            transition: transform 0.1s ease-out;
        }

        .compass-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 2px solid #222;
            position: relative;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(255, 255, 255, 0.05);
        }

        .direction {
            position: absolute;
            text-align: center;
            line-height: 1;
        }

        .dir-n { top: 15px; color: #ff4d4d; font-weight: 700; font-size: 1.4rem; }
        .dir-s { bottom: 15px; color: #fff; font-weight: 500; font-size: 1.2rem; }
        .dir-e { right: 15px; color: #fff; font-weight: 500; font-size: 1.2rem; }
        .dir-w { left: 15px; color: #fff; font-weight: 500; font-size: 1.2rem; }

        .needle {
            position: absolute;
            width: 2px;
            height: 120px;
            background: linear-gradient(to bottom, #ff4d4d 50%, #444 50%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .center-dot {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #fff;
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 11;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .info-card {
            background: rgba(20, 20, 20, 0.8);
            border: 1px solid #333;
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            max-width: 360px;
            text-align: center;
        }

        .glow-text {
            text-shadow: 0 0 10px rgba(59, 130, 246, 0.5);
        }
    </style>
</head>
<body>

    <!-- Clock & Weather -->
    <div class="info-card">
        <div id="clock-container" class="mb-1">
            <div id="clock" class="text-3xl font-bold tracking-tighter glow-text text-blue-400">00:00:00</div>
            <div id="clock-bn" class="text-xs text-blue-900 font-medium">০০:০০:০০</div>
        </div>
        <div id="weather" class="text-sm mt-1 text-gray-400">
            <span>Loading Weather...</span>
            <span class="bn-text">আবহাওয়া লোড হচ্ছে...</span>
        </div>
    </div>

    <!-- GPS Coordinates -->
    <div class="info-card">
        <div class="text-[10px] uppercase tracking-[0.2em] text-gray-500 mb-1">GPS Location | জিপিএস অবস্থান</div>
        <div id="coords" class="font-mono text-xs text-green-500">
            LAT: -- | LON: --
        </div>
        <div id="coords-bn" class="font-mono text-[10px] text-green-800">
            অক্ষাংশ: -- | দ্রাঘিমাংশ: --
        </div>
    </div>

    <!-- Compass -->
    <div class="flex flex-col items-center">
        <div id="heading-container" class="text-center mb-6">
            <h2 id="heading-en" class="text-2xl font-bold text-white uppercase tracking-widest">NORTH</h2>
            <h3 id="heading-bn" class="text-lg text-red-500 font-medium">উত্তর</h3>
        </div>

        <div class="compass-container" id="compass">
            <div class="compass-ring">
                <div class="direction dir-n">N<span class="bn-text !text-[10px]">উ</span></div>
                <div class="direction dir-e" style="transform: rotate(90deg) translate(0, -110px) rotate(-90deg);">E<span class="bn-text !text-[10px]">পূ</span></div>
                <div class="direction dir-s" style="transform: rotate(180deg) translate(0, -110px) rotate(-180deg);">S<span class="bn-text !text-[10px]">দ</span></div>
                <div class="direction dir-w" style="transform: rotate(270deg) translate(0, -110px) rotate(-270deg);">W<span class="bn-text !text-[10px]">প</span></div>
                
                <!-- Inter-cardinal small markers -->
                <div class="text-[9px] text-gray-600 absolute" style="transform: rotate(45deg) translate(0, -110px) rotate(-45deg);">NE</div>
                <div class="text-[9px] text-gray-600 absolute" style="transform: rotate(135deg) translate(0, -110px) rotate(-135deg);">SE</div>
                <div class="text-[9px] text-gray-600 absolute" style="transform: rotate(225deg) translate(0, -110px) rotate(-225deg);">SW</div>
                <div class="text-[9px] text-gray-600 absolute" style="transform: rotate(315deg) translate(0, -110px) rotate(-315deg);">NW</div>

                <div class="needle"></div>
                <div class="center-dot"></div>
            </div>
        </div>
        
        <div class="mt-6 text-center">
            <div id="degree-val" class="text-4xl font-light text-yellow-500 tracking-tighter">0°</div>
            <div id="degree-bn" class="bn-text text-yellow-800">০° ডিগ্রি</div>
        </div>
    </div>

    <!-- Status / Permission -->
    <div id="status-area" class="w-full text-center p-2">
        <button id="start-btn" class="bg-white text-black text-xs font-bold px-6 py-3 rounded-full uppercase tracking-widest active:scale-95 transition-all shadow-lg shadow-white/10">
            Start Sensors | সেন্সর চালু করুন
        </button>
    </div>

    <script>
        const bnDigits = ['০', '১', '২', '৩', '৪', '৫', '৬', '৭', '৮', '৯'];
        const toBn = (n) => n.toString().replace(/\d/g, d => bnDigits[d]);

        function updateClock() {
            const now = new Date();
            // 24-hour format: HH:mm:ss
            const hours = String(now.getHours()).padStart(2, '0');
            const minutes = String(now.getMinutes()).padStart(2, '0');
            const seconds = String(now.getSeconds()).padStart(2, '0');
            
            const timeStr = `${hours}:${minutes}:${seconds}`;
            document.getElementById('clock').textContent = timeStr;
            document.getElementById('clock-bn').textContent = toBn(timeStr);
        }
        setInterval(updateClock, 1000);
        updateClock();

        async function fetchWeather(lat, lon) {
            try {
                const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
                const data = await res.json();
                const temp = Math.round(data.current_weather.temperature);
                document.getElementById('weather').innerHTML = `
                    <span>${temp}°C Current Temperature</span>
                    <span class="bn-text">তাপমাত্রা: ${toBn(temp)}° সেলসিয়াস</span>
                `;
            } catch (e) {
                document.getElementById('weather').textContent = "Weather Error | আবহাওয়া ত্রুটি";
            }
        }

        const directions = [
            { en: "NORTH", bn: "উত্তর" },
            { en: "NORTH-EAST", bn: "উত্তর-পূর্ব" },
            { en: "EAST", bn: "পূর্ব" },
            { en: "SOUTH-EAST", bn: "দক্ষিণ-পূর্ব" },
            { en: "SOUTH", bn: "দক্ষিণ" },
            { en: "SOUTH-WEST", bn: "দক্ষিণ-পশ্চিম" },
            { en: "WEST", bn: "পশ্চিম" },
            { en: "NORTH-WEST", bn: "উত্তর-পশ্চিম" }
        ];

        function getDir(deg) {
            const index = Math.round(deg / 45) % 8;
            return directions[index];
        }

        function handleOrientation(event) {
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading === undefined) return;

            const deg = Math.round(heading);
            document.getElementById('compass').style.transform = `rotate(${-deg}deg)`;
            document.getElementById('degree-val').textContent = `${deg}°`;
            document.getElementById('degree-bn').textContent = `${toBn(deg)}° ডিগ্রি`;
            
            const dirNames = getDir(deg);
            document.getElementById('heading-en').textContent = dirNames.en;
            document.getElementById('heading-bn').textContent = dirNames.bn;
        }

        function init() {
            // Location
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(pos => {
                    const lat = pos.coords.latitude.toFixed(4);
                    const lon = pos.coords.longitude.toFixed(4);
                    document.getElementById('coords').textContent = `LAT: ${lat} | LON: ${lon}`;
                    document.getElementById('coords-bn').textContent = `অক্ষাংশ: ${toBn(lat)} | দ্রাঘিমাংশ: ${toBn(lon)}`;
                    fetchWeather(lat, lon);
                });
            }

            // Compass Logic
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        document.getElementById('status-area').style.display = 'none';
                    }
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('status-area').style.display = 'none';
            }
        }

        document.getElementById('start-btn').addEventListener('click', init);
    </script>
</body>
</html>
