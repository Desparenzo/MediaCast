<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Data Visualizer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 40px 20px;
        }
        .overlay-btn {
            pointer-events: auto; padding: 15px 35px;
            background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0;
            color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #data-panel {
            pointer-events: auto;
            width: 100%; max-width: 300px;
            background: rgba(0, 20, 0, 0.9); border: 1px solid #0f0;
            color: #0f0; font-size: 14px; padding: 15px; border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }
        .label { opacity: 0.6; font-size: 10px; margin-bottom: 2px; }
        .val { font-size: 18px; font-weight: bold; margin-bottom: 10px; color: #fff; text-shadow: 0 0 5px #0f0; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="data-panel">
            <div class="label">ALPHA (Z - Yaw/Compass)</div>
            <div id="val-alpha" class="val">0.00°</div>
            <div class="label">BETA (X - Pitch/Tilt)</div>
            <div id="val-beta" class="val">0.00°</div>
            <div class="label">GAMMA (Y - Roll)</div>
            <div id="val-gamma" class="val">0.00°</div>
        </div>

        <button id="start-btn" class="overlay-btn">Start Neural Link</button>
    </div>

    <script>
        let scene, camera, renderer, stick;
        let sensorData = { alpha: 0, beta: 0, gamma: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 5);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting for the stick
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Create the Diagnostic Stick (representing the phone)
            const geometry = new THREE.CylinderGeometry(0.1, 0.1, 3, 16);
            const material = new THREE.MeshPhongMaterial({ color: 0x00ff00, emissive: 0x002200 });
            stick = new THREE.Mesh(geometry, material);
            
            // Add a "Top" marker to the stick so we know which end is up
            const tipGeom = new THREE.SphereGeometry(0.2, 16, 16);
            const tipMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const tip = new THREE.Mesh(tipGeom, tipMat);
            tip.position.y = 1.5;
            stick.add(tip);
            
            scene.add(stick);

            // Add a reference grid
            const grid = new THREE.GridHelper(10, 10, 0x444444, 0x222222);
            grid.rotation.x = Math.PI / 2; // Face the camera
            scene.add(grid);

            document.getElementById('start-btn').addEventListener('click', startSensors);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
            document.getElementById('start-btn').style.display = 'none';
        }

        function handleOrientation(event) {
            sensorData.alpha = event.alpha || 0;
            sensorData.beta = event.beta || 0;
            sensorData.gamma = event.gamma || 0;

            document.getElementById('val-alpha').innerText = sensorData.alpha.toFixed(2) + '°';
            document.getElementById('val-beta').innerText = sensorData.beta.toFixed(2) + '°';
            document.getElementById('val-gamma').innerText = sensorData.gamma.toFixed(2) + '°';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Convert to Radians
            const a = THREE.MathUtils.degToRad(sensorData.alpha);
            const b = THREE.MathUtils.degToRad(sensorData.beta);
            const g = THREE.MathUtils.degToRad(sensorData.gamma);

            // Device Orientation Mapping
            // This is the standard mapping for phone rotation in 3D space
            const euler = new THREE.Euler(b, a, -g, 'YXZ');
            stick.quaternion.setFromEuler(euler);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
