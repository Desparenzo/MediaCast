<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>P2P Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; overflow: hidden; font-family: 'Inter', system-ui, sans-serif; }
        
        .compass-ring {
            width: 280px;
            height: 280px;
            border: 1px solid #222;
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #arrow {
            width: 100px;
            height: 100px;
            transition: transform 0.1s linear;
            filter: drop-shadow(0 0 15px rgba(239, 68, 68, 0.6));
        }

        .bulb {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background-color: #374151;
            transition: all 0.3s ease;
        }
        .bulb-active {
            background-color: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        input::placeholder { color: #4b5563; }
        
        .status-bar {
            background: linear-gradient(to right, #111, #000);
            border-bottom: 1px solid #222;
        }
    </style>
</head>
<body class="flex flex-col h-screen w-screen">

    <!-- Status Bar -->
    <div class="status-bar w-full py-3 px-6 flex justify-between items-center">
        <div class="flex items-center space-x-2">
            <div id="status-bulb" class="bulb"></div>
            <span id="status-text" class="text-xs font-bold uppercase tracking-widest text-gray-500">Offline</span>
        </div>
        <div class="text-right">
            <p class="text-[10px] text-gray-500 uppercase tracking-tighter">Your ID</p>
            <p id="my-id" class="text-lg font-black text-white leading-none">------</p>
        </div>
    </div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col items-center justify-around p-6">
        
        <!-- Coordinates Display -->
        <div class="w-full grid grid-cols-2 gap-2 text-[10px] font-mono text-gray-500">
            <div class="border-l border-gray-800 pl-2">
                <p class="text-gray-400 mb-1">ME</p>
                <div id="my-coords">LAT: --<br>LNG: --</div>
            </div>
            <div class="border-l border-red-900/50 pl-2">
                <p class="text-red-500 mb-1">TARGET</p>
                <div id="target-coords">LAT: --<br>LNG: --</div>
            </div>
        </div>

        <!-- Compass Area -->
        <div class="relative flex flex-col items-center">
            <div class="compass-ring">
                <!-- Decorative Ticks -->
                <div class="absolute inset-0 opacity-20">
                    <div class="absolute top-2 left-1/2 -translate-x-1/2">N</div>
                    <div class="absolute bottom-2 left-1/2 -translate-x-1/2">S</div>
                    <div class="absolute right-2 top-1/2 -translate-y-1/2">E</div>
                    <div class="absolute left-2 top-1/2 -translate-y-1/2">W</div>
                </div>
                
                <!-- The Arrow -->
                <svg id="arrow" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M50 5L90 85L50 70L10 85L50 5Z" fill="#ef4444" />
                </svg>

                <div id="distance" class="absolute bottom-[-40px] text-2xl font-black text-white">-- m</div>
            </div>
        </div>

        <!-- Connection Input -->
        <div class="w-full max-w-xs space-y-3">
            <div class="relative">
                <input type="text" id="target-id" placeholder="ENTER 6-DIGIT CODE" maxlength="6"
                    class="w-full bg-transparent border-b-2 border-gray-800 py-3 text-center text-2xl font-bold tracking-[0.5em] focus:outline-none focus:border-red-600 transition-colors uppercase">
            </div>
            <button id="connect-btn" class="w-full py-4 text-xs font-bold tracking-[0.2em] uppercase border border-gray-700 hover:bg-white hover:text-black transition-all">
                Establish Link
            </button>
        </div>
    </div>

    <script>
        const peerId = Math.floor(100000 + Math.random() * 900000).toString();
        document.getElementById('my-id').innerText = peerId;

        const peer = new Peer(peerId);
        let activeConn = null;
        let myPos = { lat: 0, lng: 0 };
        let targetPos = { lat: 0, lng: 0 };
        let phoneHeading = 0; // Direction phone is pointing
        let bearingToTarget = 0; // Direction target is from North

        // UI Refs
        const bulb = document.getElementById('status-bulb');
        const statusText = document.getElementById('status-text');
        const arrow = document.getElementById('arrow');
        const distText = document.getElementById('distance');

        // 1. Android/PC Compass Logic (Direct)
        window.addEventListener('deviceorientationabsolute', (e) => {
            // Android uses alpha for compass when using absolute event
            if (e.alpha !== null) {
                phoneHeading = 360 - e.alpha;
                updateArrow();
            }
        }, true);

        // 2. GPS Logic
        navigator.geolocation.watchPosition(pos => {
            myPos.lat = pos.coords.latitude;
            myPos.lng = pos.coords.longitude;
            document.getElementById('my-coords').innerHTML = `LAT: ${myPos.lat.toFixed(4)}<br>LNG: ${myPos.lng.toFixed(4)}`;
            
            if (activeConn && activeConn.open) {
                activeConn.send({ lat: myPos.lat, lng: myPos.lng });
            }
            calculateEverything();
        }, err => console.error(err), { enableHighAccuracy: true });

        // 3. Peer Connection
        peer.on('connection', conn => handleConnection(conn));

        document.getElementById('connect-btn').onclick = () => {
            const id = document.getElementById('target-id').value;
            if (id.length === 6) handleConnection(peer.connect(id));
        };

        function handleConnection(conn) {
            activeConn = conn;
            conn.on('open', () => {
                bulb.classList.add('bulb-active');
                statusText.innerText = "Linked";
                statusText.classList.replace('text-gray-500', 'text-green-500');
                if (myPos.lat) conn.send(myPos);
            });

            conn.on('data', data => {
                targetPos = data;
                document.getElementById('target-coords').innerHTML = `LAT: ${targetPos.lat.toFixed(4)}<br>LNG: ${targetPos.lng.toFixed(4)}`;
                calculateEverything();
            });

            conn.on('close', () => {
                bulb.classList.remove('bulb-active');
                statusText.innerText = "Link Severed";
                statusText.classList.replace('text-green-500', 'text-red-500');
            });
        }

        // 4. Calculations
        function calculateEverything() {
            if (!myPos.lat || !targetPos.lat) return;

            // Distance
            const R = 6371000;
            const dLat = (targetPos.lat - myPos.lat) * Math.PI / 180;
            const dLon = (targetPos.lng - myPos.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(myPos.lat * Math.PI/180) * Math.cos(targetPos.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const d = R * c;
            distText.innerText = d > 1000 ? (d/1000).toFixed(1) + "km" : Math.round(d) + "m";

            // Bearing
            const y = Math.sin(dLon) * Math.cos(targetPos.lat * Math.PI / 180);
            const x = Math.cos(myPos.lat * Math.PI / 180) * Math.sin(targetPos.lat * Math.PI / 180) -
                      Math.sin(myPos.lat * Math.PI / 180) * Math.cos(targetPos.lat * Math.PI / 180) * Math.cos(dLon);
            bearingToTarget = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            updateArrow();
        }

        function updateArrow() {
            // Visual Rotation = Bearing - Phone Orientation
            const rotation = bearingToTarget - phoneHeading;
            arrow.style.transform = `rotate(${rotation}deg)`;
        }
    </script>
</body>
</html>
