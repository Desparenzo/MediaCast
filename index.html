<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Viewfinder Simulator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 20px;
            z-index: 10;
        }
        .pointer-events-auto { pointer-events: auto; }
        .hud-border {
            border: 1px solid rgba(34, 197, 94, 0.3);
        }
        #video-preview {
            position: fixed;
            bottom: 20px;
            right: 20px;
            width: 120px;
            height: 90px;
            border: 2px solid #22c55e;
            border-radius: 8px;
            object-fit: cover;
            transform: scaleX(-1);
            background: #111;
        }
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #22c55e;
            box-shadow: 0 0 15px #22c55e;
            top: 0;
            animation: scan 3s linear infinite;
            display: none;
        }
        @keyframes scan {
            from { top: 0%; }
            to { top: 100%; }
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="flex justify-between items-start">
            <div class="text-green-500 bg-black/50 p-2 hud-border rounded">
                <div class="text-xs">ALTITUDE: 1.78M</div>
                <div id="gyro-data" class="text-[10px]">GYRO: WAITING...</div>
            </div>
            <div class="text-green-500 bg-black/50 p-2 hud-border rounded text-right">
                <div class="text-xs">SYSTEM: ACTIVE</div>
                <div class="text-[10px]">SCANNER v1.0.4</div>
            </div>
        </div>

        <div class="flex flex-col items-center gap-4 mb-8">
            <div id="status-msg" class="text-green-500 text-xs animate-pulse">STANDBY - ALIGN SENSORS</div>
            <button id="scan-btn" class="pointer-events-auto w-20 h-20 rounded-full border-4 border-green-500 flex items-center justify-center bg-green-500/10 active:bg-green-500/40 transition-colors">
                <div class="w-16 h-16 rounded-full border-2 border-green-500"></div>
            </button>
        </div>
    </div>

    <video id="video-preview" autoplay playsinline muted></video>
    <div id="scan-line" class="scan-line"></div>
    <canvas id="hidden-canvas" style="display:none;"></canvas>

    <script>
        let scene, camera, renderer, points, grid;
        let video = document.getElementById('video-preview');
        let scanBtn = document.getElementById('scan-btn');
        let statusMsg = document.getElementById('status-msg');
        let scanLine = document.getElementById('scan-line');
        let gyroDisplay = document.getElementById('gyro-data');
        
        const PLAYER_HEIGHT = 1.78; // 5'10" in meters
        let currentRotation = { alpha: 0, beta: 0, gamma: 0 };
        let pointsGroup = new THREE.Group();

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera at 5'10" height
            camera.position.set(0, PLAYER_HEIGHT, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Create initial empty floor dots
            const gridCount = 40;
            const gridSpacing = 1;
            const gridGeometry = new THREE.BufferGeometry();
            const gridPositions = [];
            for(let x = -gridCount; x <= gridCount; x++) {
                for(let z = -gridCount; z <= gridCount; z++) {
                    gridPositions.push(x * gridSpacing, 0, z * gridSpacing);
                }
            }
            gridGeometry.setAttribute('position', new THREE.Float32BufferAttribute(gridPositions, 3));
            const gridMaterial = new THREE.PointsMaterial({ color: 0x004400, size: 0.05 });
            grid = new THREE.Points(gridGeometry, gridMaterial);
            scene.add(grid);
            scene.add(pointsGroup);

            window.addEventListener('resize', onWindowResize, false);
            setupCamera();
            setupGyro();
            animate();
        }

        async function setupCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' }, 
                    audio: false 
                });
                video.srcObject = stream;
            } catch (err) {
                statusMsg.innerText = "CAMERA ACCESS DENIED";
                console.error(err);
            }
        }

        function setupGyro() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                scanBtn.addEventListener('click', async () => {
                    try {
                        const permission = await DeviceOrientationEvent.requestPermission();
                        if (permission === 'granted') {
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                    } catch (e) { console.error(e); }
                }, { once: true });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            // Alpha: rotation around z-axis
            // Beta: front back motion
            // Gamma: left right motion
            currentRotation.alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
            currentRotation.beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
            currentRotation.gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;

            gyroDisplay.innerText = `GYRO: A:${Math.round(event.alpha)} B:${Math.round(event.beta)} G:${Math.round(event.gamma)}`;
        }

        function captureEnvironment() {
            statusMsg.innerText = "SCANNING ENVIRONMENT...";
            scanLine.style.display = 'block';
            
            const canvas = document.getElementById('hidden-canvas');
            const ctx = canvas.getContext('2d');
            const w = 80; // Lower res for performance
            const h = 60;
            canvas.width = w;
            canvas.height = h;
            
            ctx.drawImage(video, 0, 0, w, h);
            const imageData = ctx.getImageData(0, 0, w, h).data;
            
            // Clear previous points
            while(pointsGroup.children.length > 0) pointsGroup.remove(pointsGroup.children[0]);

            const positions = [];
            const colors = [];

            // Project pixels into 3D space based on camera direction
            const vector = new THREE.Vector3();
            camera.getWorldDirection(vector);

            for (let y = 0; y < h; y++) {
                for (let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    const r = imageData[idx];
                    const g = imageData[idx + 1];
                    const b = imageData[idx + 2];
                    const brightness = (r + g + b) / 3;

                    if (brightness > 40) { // Threshold to capture "objects"
                        // Map pixels to a sphere/frustum in front of player
                        const phi = (y / h - 0.5) * Math.PI * 0.5;
                        const theta = (x / w - 0.5) * Math.PI * 0.5;
                        const dist = 2 + (255 - brightness) / 50; // Brighter is closer

                        const px = Math.sin(theta) * dist;
                        const py = PLAYER_HEIGHT + Math.sin(-phi) * dist;
                        const pz = -Math.cos(theta) * dist;

                        positions.push(px, py, pz);
                    }
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const material = new THREE.PointsMaterial({ 
                color: 0x22c55e, 
                size: 0.03,
                transparent: true,
                opacity: 0.8
            });
            
            const newPoints = new THREE.Points(geometry, material);
            
            // Align points group to current camera orientation so they stay "fixed" in space
            pointsGroup.quaternion.copy(camera.quaternion);
            pointsGroup.position.copy(camera.position);
            pointsGroup.add(newPoints);

            setTimeout(() => {
                scanLine.style.display = 'none';
                statusMsg.innerText = "SCAN COMPLETE - DATA STORED";
            }, 1000);
        }

        scanBtn.addEventListener('click', captureEnvironment);

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Apply Gyro to Camera
            // Simple mapping - alpha is compass/yaw, beta is pitch
            if (currentRotation) {
                camera.rotation.set(
                    currentRotation.beta + Math.PI/2, // Offset for holding phone upright
                    -currentRotation.gamma,
                    currentRotation.alpha,
                    'YXZ'
                );
            }

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
