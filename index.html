```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multi-Point Gyro Diagnostic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: 'ui-monospace', 'SFMono-Regular', monospace; }
    </style>
</head>
<body class="text-white">

    <div class="fixed top-0 left-0 w-full p-4 z-20">
        <header class="flex justify-between items-center">
            <div>
                <h1 class="text-lg font-black tracking-tighter text-blue-400 uppercase leading-none">Diagnostic Logger</h1>
                <p id="statusMsg" class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-1">Ready for Capture</p>
            </div>
            <button id="permissionBtn" class="bg-blue-600 px-4 py-2 rounded-full text-xs font-bold shadow-lg">START SENSORS</button>
        </header>
    </div>

    <!-- Diagnostic Step Overlay -->
    <div id="diagBox" class="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-80 glass p-6 rounded-3xl z-30 text-center hidden">
        <div id="stepCounter" class="text-blue-400 font-bold uppercase text-[10px] tracking-widest mb-2">Step 1 of 6</div>
        <p id="instruction" class="text-base font-medium leading-tight mb-6">Lay phone flat on a table (Screen Facing Up).</p>
        <button id="captureBtn" class="w-full bg-blue-600 py-3 rounded-xl text-sm font-bold uppercase shadow-xl mb-3">Capture Position Data</button>
        <p id="rawPreview" class="text-[10px] text-slate-400 mono">A: 0 | B: 0 | G: 0</p>
    </div>

    <!-- Result Display -->
    <div id="resultBox" class="fixed inset-4 glass p-6 rounded-3xl z-40 hidden flex flex-col">
        <h2 class="text-xl font-bold text-blue-400 mb-2">Diagnostic Data Ready</h2>
        <p class="text-xs text-slate-400 mb-4">Copy the text below and paste it in our chat:</p>
        <textarea id="resultText" class="flex-1 bg-black/50 p-4 rounded-xl font-mono text-[10px] text-emerald-400 border border-white/10 resize-none mb-4" readonly></textarea>
        <button id="copyBtn" class="bg-white text-black py-3 rounded-xl font-bold uppercase">Copy to Clipboard</button>
    </div>

    <div id="canvas-container" class="fixed inset-0 opacity-50"></div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let sensorActive = false;
        let currentRaw = { a: 0, b: 0, g: 0 };
        let capturedData = [];
        
        const steps = [
            "1. Phone FLAT on table (Screen UP).",
            "2. Phone STANDING upright (Portrait mode).",
            "3. Phone UPSIDE DOWN (Standing on its top edge).",
            "4. Phone on LEFT SIDE (Landscape, volume buttons down).",
            "5. Phone on RIGHT SIDE (Landscape, power button down).",
            "6. Phone SCREEN DOWN (Flat on table face down)."
        ];
        let currentStepIdx = 0;

        function createSimplePhone() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 4.8, 0.3),
                new THREE.MeshPhongMaterial({ color: 0x334155 })
            );
            group.add(body);
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.2, 4.6),
                new THREE.MeshBasicMaterial({ color: 0x3b82f6 })
            );
            screen.position.z = 0.16;
            group.add(screen);
            return group;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            phoneGroup = createSimplePhone();
            scene.add(phoneGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            camera.position.set(0, 0, 10);
            
            function animate() {
                requestAnimationFrame(animate);
                if (!sensorActive) phoneGroup.rotation.y += 0.01;
                renderer.render(scene, camera);
            }
            animate();
        }

        async function start() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }
            
            window.addEventListener('deviceorientation', (e) => {
                sensorActive = true;
                currentRaw = { a: e.alpha || 0, b: e.beta || 0, g: e.gamma || 0 };
                document.getElementById('rawPreview').innerText = 
                    `A: ${currentRaw.a.toFixed(1)} | B: ${currentRaw.b.toFixed(1)} | G: ${currentRaw.g.toFixed(1)}`;
                
                // Visual feedback (uncalibrated)
                const rad = Math.PI / 180;
                phoneGroup.rotation.set(currentRaw.b * rad, currentRaw.a * rad, currentRaw.g * rad, 'YXZ');
            });

            document.getElementById('permissionBtn').classList.add('hidden');
            document.getElementById('diagBox').classList.remove('hidden');
        }

        function captureCurrentStep() {
            capturedData.push({
                step: steps[currentStepIdx],
                data: { ...currentRaw }
            });

            currentStepIdx++;
            if (currentStepIdx < steps.length) {
                document.getElementById('stepCounter').innerText = `Step ${currentStepIdx + 1} of 6`;
                document.getElementById('instruction').innerText = steps[currentStepIdx];
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById('diagBox').classList.add('hidden');
            document.getElementById('resultBox').classList.remove('hidden');
            
            const resultStr = capturedData.map(d => 
                `${d.step}\nRAW: Alpha=${d.data.a.toFixed(2)}, Beta=${d.data.b.toFixed(2)}, Gamma=${d.data.g.toFixed(2)}`
            ).join('\n\n');
            
            document.getElementById('resultText').value = resultStr;
        }

        window.onload = () => {
            init3D();
            document.getElementById('permissionBtn').onclick = start;
            document.getElementById('captureBtn').onclick = captureCurrentStep;
            document.getElementById('copyBtn').onclick = () => {
                const text = document.getElementById('resultText').value;
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                document.getElementById('copyBtn').innerText = "COPIED!";
            };
        };
    </script>
</body>
</html>
