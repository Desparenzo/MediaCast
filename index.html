```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Precision Compass-Gyro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; touch-action: none; }
        canvas { display: block; }
        #overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10;
        }
        .hud-ui {
            position: absolute; bottom: 40px; color: #00ff00; text-align: center;
            font-size: 14px; background: rgba(0, 40, 0, 0.7); padding: 15px 30px;
            border: 2px solid #00ff00; pointer-events: auto; text-transform: uppercase;
            letter-spacing: 2px; font-weight: bold;
        }
        #crosshair {
            width: 20px; height: 20px; border: 1px solid rgba(0, 255, 0, 0.5);
            position: relative;
        }
        #crosshair::before { content: ''; position: absolute; top: 50%; left: -5px; width: 30px; height: 1px; background: #0f0; }
        #crosshair::after { content: ''; position: absolute; left: 50%; top: -5px; width: 1px; height: 30px; background: #0f0; }
        
        #debug {
            position: absolute; top: 20px; left: 20px; color: #0f0; 
            font-size: 10px; line-height: 1.4; background: rgba(0,0,0,0.5); padding: 5px;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="crosshair"></div>
        <div id="init-btn" class="hud-ui cursor-pointer">
            Initialize Compass & Gyro
        </div>
        <div id="debug">
            SYSTEM: OFFLINE<br>
            HEADING: 0.00<br>
            ATTITUDE: 0.00
        </div>
    </div>

    <script>
        let scene, camera, renderer, room;
        const playerHeight = 1.6;

        // Using Euler and Quaternion for stable rotation
        const currentOrientation = new THREE.Quaternion();
        const screenTransform = new THREE.Quaternion();
        const worldTransform = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // -90 deg around X
        
        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createScene();
            window.addEventListener('resize', onWindowResize);
            document.getElementById('init-btn').addEventListener('click', startTracking);
            
            animate();
        }

        function createScene() {
            // 10x10x4 Room
            const size = 10;
            const height = 4;
            
            // Floor Grid
            const grid = new THREE.GridHelper(size, 20, 0x00ff00, 0x002200);
            scene.add(grid);

            // Ceiling Grid
            const ceilingGrid = new THREE.GridHelper(size, 20, 0x00ff00, 0x002200);
            ceilingGrid.position.y = height;
            scene.add(ceilingGrid);

            // Walls (using wireframe box)
            const geom = new THREE.BoxGeometry(size, height, size);
            const edges = new THREE.EdgesGeometry(geom);
            const mat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.5 });
            room = new THREE.LineSegments(edges, mat);
            room.position.y = height / 2;
            scene.add(room);

            // Orientation Markers (N, S, E, W)
            addMarker(0, playerHeight, -4.5, 0xff0000); // NORTH (Front)
            addMarker(4.5, playerHeight, 0, 0x00ff00);  // EAST
            addMarker(-4.5, playerHeight, 0, 0x0000ff); // WEST
            addMarker(0, playerHeight, 4.5, 0xffffff);  // SOUTH
        }

        function addMarker(x, y, z, color) {
            const mGeom = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const mMat = new THREE.MeshBasicMaterial({ color: color });
            const mesh = new THREE.Mesh(mGeom, mMat);
            mesh.position.set(x, y, z);
            scene.add(mesh);
        }

        async function startTracking() {
            const debugEl = document.getElementById('debug');
            
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    window.addEventListener('deviceorientation', onDeviceOrientation, true);
                    debugEl.innerHTML = "SYSTEM: ONLINE (iOS)";
                }
            } else {
                window.addEventListener('deviceorientationabsolute', onDeviceOrientation, true) || 
                window.addEventListener('deviceorientation', onDeviceOrientation, true);
                debugEl.innerHTML = "SYSTEM: ONLINE (ANDROID)";
            }
            document.getElementById('init-btn').style.display = 'none';
        }

        function onDeviceOrientation(event) {
            // Compass heading logic
            let alpha = event.alpha; // Z-axis rotation
            if (event.webkitCompassHeading) {
                alpha = 360 - event.webkitCompassHeading; // iOS Compass
            }
            
            const beta = event.beta;   // X-axis rotation (-180 to 180)
            const gamma = event.gamma; // Y-axis rotation (-90 to 90)
            const screen = window.orientation || 0;

            // Debug readout
            document.getElementById('debug').innerHTML = `
                SYSTEM: ACTIVE<br>
                YAW: ${alpha.toFixed(2)}<br>
                PITCH: ${beta.toFixed(2)}<br>
                ROLL: ${gamma.toFixed(2)}
            `;

            // Convert degrees to radians
            const ra = THREE.MathUtils.degToRad(alpha);
            const rb = THREE.MathUtils.degToRad(beta);
            const rg = THREE.MathUtils.degToRad(gamma);
            const rs = THREE.MathUtils.degToRad(screen);

            // THE FIX: Matrix transformation for mobile viewport
            // 1. Set orientation from sensors
            const euler = new THREE.Euler(rb, ra, -rg, 'YXZ'); 
            currentOrientation.setFromEuler(euler);
            
            // 2. Adjust for screen rotation (Landscape vs Portrait)
            screenTransform.setFromAxisAngle(new THREE.Vector3(0, 0, 1), -rs);
            
            // 3. Apply everything to camera
            camera.quaternion.copy(worldTransform); // Start at base
            camera.quaternion.multiply(currentOrientation); // Add gyro
            camera.quaternion.multiply(screenTransform); // Add screen offset
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
