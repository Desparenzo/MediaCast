<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Left-Right Panning Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: monospace; }
        canvas { display: block; }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            z-index: 100;
            background: rgba(255, 255, 255, 0.8);
            padding: 10px;
            border-radius: 8px;
            font-size: 12px;
            border: 1px solid #ddd;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        #overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-xl font-bold mb-4 text-center">ONLY LEFT-RIGHT PANNING</h1>
        <button onclick="requestAccess()" class="bg-black text-white px-10 py-4 rounded-full font-bold">START TEST</button>
    </div>

    <div class="hud">
        <div class="font-bold border-b mb-2">ORIENTATION DETECTED</div>
        <div id="mode-display" class="text-blue-600 mb-2">DETECTING...</div>
        <div>Sensor Alpha: <span id="val-a">0</span></div>
        <div>Sensor Beta:  <span id="val-b">0</span></div>
        <div>Sensor Gamma: <span id="val-g">0</span></div>
        <div class="mt-2 pt-2 border-t font-bold">WORLD YAW: <span id="val-yaw" class="text-red-600">0</span></div>
    </div>

    <div class="controls">
        <button onclick="reset()" class="bg-black text-white px-8 py-3 rounded-xl font-bold">RESET CENTER</button>
    </div>

    <script>
        let scene, camera, renderer, worldGroup;
        let sensor = { a: 0, b: 0, g: 0 };
        let offsetYaw = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2;

            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Large White Pillar in front
            const pillar = new THREE.Mesh(
                new THREE.BoxGeometry(0.8, 10, 0.8),
                new THREE.MeshBasicMaterial({ color: 0x333333 })
            );
            pillar.position.set(0, 0, -5);
            worldGroup.add(pillar);

            // Floor markers
            const grid = new THREE.GridHelper(40, 20, 0xcccccc, 0xeeeeee);
            grid.position.y = -2;
            worldGroup.add(grid);

            window.addEventListener('resize', onResize);
            animate();
        }

        function requestAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') start();
                });
            } else {
                start();
            }
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            window.addEventListener('deviceorientation', (e) => {
                sensor.a = e.alpha || 0;
                sensor.b = e.beta || 0;
                sensor.g = e.gamma || 0;
            });
            init();
        }

        function reset() {
            // Recenter based on current horizontal value
            offsetYaw = calculateCurrentYaw();
        }

        function calculateCurrentYaw() {
            const degToRad = Math.PI / 180;
            // Determine if phone is upright (Beta ~90) or flat (Beta ~0)
            const isUpright = Math.abs(sensor.b) > 45;
            
            if (isUpright) {
                // In upright mode, Alpha is often jittery or swapped with Gamma
                // Let's test if Gamma is the primary horizontal mover here
                return sensor.a * degToRad; // Testing Alpha first, even in upright
            } else {
                return sensor.a * degToRad; // Flat mode uses Alpha
            }
        }

        function animate() {
            requestAnimationFrame(animate);
            if (worldGroup) {
                const degToRad = Math.PI / 180;
                
                // Logic: 
                // If Beta is > 45, the phone is tilted up. 
                // In this state, panning is often Alpha, but sometimes Gamma.
                const isUpright = Math.abs(sensor.b) > 45;
                document.getElementById('mode-display').innerText = isUpright ? "UPRIGHT (CAMERA)" : "FLAT (COMPASS)";
                
                let currentYaw = sensor.a * degToRad;
                
                // INVERSION: To keep pillar still, move world opposite to phone
                worldGroup.rotation.y = -(currentYaw - offsetYaw);

                // HUD
                document.getElementById('val-a').innerText = sensor.a.toFixed(1);
                document.getElementById('val-b').innerText = sensor.b.toFixed(1);
                document.getElementById('val-g').innerText = sensor.g.toFixed(1);
                document.getElementById('val-yaw').innerText = worldGroup.rotation.y.toFixed(2);
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
