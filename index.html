```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>High-Precision GPS Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: system-ui, sans-serif; overflow-x: hidden; }
        #map-container {
            aspect-ratio: 1 / 1;
            background-color: #1e293b;
            background-image: radial-gradient(#334155 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .dot { transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .accuracy-ring {
            position: absolute;
            border: 2px solid rgba(59, 130, 246, 0.3);
            background: rgba(59, 130, 246, 0.1);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .compass-needle {
            width: 4px; height: 16px; background: #3b82f6;
            position: absolute; top: -18px; left: calc(50% - 2px);
            clip-path: polygon(50% 0%, 0% 100%, 100% 100%);
        }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto">

    <header class="mb-6">
        <h1 class="text-xl font-black tracking-tight text-blue-400">SAT-TRACK PRO</h1>
        <p class="text-[10px] text-gray-500 uppercase tracking-widest">Hardware Sensor Interface</p>
    </header>

    <!-- Inputs -->
    <div class="space-y-3 mb-6">
        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Start Point</label>
            <div class="flex gap-2">
                <input type="text" id="start-coords" placeholder="Lat, Long" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
                <button onclick="updateManual('start')" class="bg-slate-700 px-3 rounded-lg text-xs font-bold">Find</button>
                <button onclick="setGPS('start')" class="bg-blue-600 p-2 rounded-lg">
                    <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                </button>
            </div>
        </div>

        <div class="bg-slate-800/50 p-3 rounded-xl border border-slate-700">
            <label class="text-[10px] font-bold text-gray-400 uppercase mb-2 block">Target Point</label>
            <div class="flex gap-2">
                <input type="text" id="target-coords" placeholder="Lat, Long" class="flex-1 bg-slate-900 border border-slate-700 rounded-lg px-3 py-2 text-sm text-white">
                <button onclick="updateManual('target')" class="bg-slate-700 px-3 rounded-lg text-xs font-bold">Find</button>
            </div>
        </div>
    </div>

    <button onclick="generateMap()" class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-xl font-bold shadow-xl transition-all active:scale-95 mb-6">
        ENGAGE LIVE TRACKING
    </button>

    <!-- Map Display -->
    <div id="map-container" class="relative rounded-2xl border-2 border-slate-700 overflow-hidden shadow-2xl mb-4">
        <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none">
            <line id="path-line" x1="0" y1="0" x2="0" y2="0" stroke="rgba(148,163,184,0.3)" stroke-width="2" stroke-dasharray="8,4" />
        </svg>

        <div id="acc-ring" class="accuracy-ring hidden"></div>
        <div id="point-start" class="dot absolute w-3 h-3 bg-slate-400 rounded-full border border-white hidden transform -translate-x-1/2 -translate-y-1/2"></div>
        <div id="point-target" class="dot absolute w-4 h-4 bg-red-500 rounded-full border-2 border-white hidden transform -translate-x-1/2 -translate-y-1/2"></div>
        
        <!-- User with Direction -->
        <div id="point-current" class="dot absolute w-5 h-5 bg-blue-500 rounded-full border-2 border-white hidden transform -translate-x-1/2 -translate-y-1/2 z-20">
            <div id="compass-node" class="absolute inset-0">
                <div class="compass-needle"></div>
            </div>
        </div>
    </div>

    <!-- Live Data Dashboard -->
    <div class="grid grid-cols-3 gap-2">
        <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 text-center">
            <div class="text-[8px] text-gray-500 uppercase">Accuracy</div>
            <div id="data-acc" class="text-xs font-mono text-blue-400">--</div>
        </div>
        <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 text-center">
            <div class="text-[8px] text-gray-500 uppercase">Heading</div>
            <div id="data-head" class="text-xs font-mono text-blue-400">0°</div>
        </div>
        <div class="bg-slate-900 p-2 rounded-lg border border-slate-800 text-center">
            <div class="text-[8px] text-gray-500 uppercase">Distance</div>
            <div id="data-dist" class="text-xs font-mono text-blue-400">0m</div>
        </div>
    </div>

    <script>
        let pts = { start: null, target: null, current: null };
        let isLive = false;
        let accuracy = 0;

        function init() {
            // Aggressive High Accuracy Tracking
            if (navigator.geolocation) {
                navigator.geolocation.watchPosition(
                    (p) => {
                        pts.current = { lat: p.coords.latitude, lng: p.coords.longitude };
                        accuracy = p.coords.accuracy;
                        document.getElementById('data-acc').innerText = accuracy.toFixed(0) + 'm';
                        if (isLive) render();
                    },
                    (e) => console.error(e),
                    { 
                        enableHighAccuracy: true, // Forces Hardware GPS
                        maximumAge: 0,            // No cached locations
                        timeout: 10000 
                    }
                );
            }

            // Compass setup
            if (window.DeviceOrientationEvent) {
                const handler = (e) => {
                    let head = e.webkitCompassHeading || (360 - e.alpha);
                    if (head) {
                        document.getElementById('compass-node').style.transform = `rotate(${head}deg)`;
                        document.getElementById('data-head').innerText = Math.round(head) + '°';
                    }
                };
                
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    document.body.addEventListener('click', () => {
                        DeviceOrientationEvent.requestPermission().then(s => {
                            if(s === 'granted') window.addEventListener('deviceorientation', handler);
                        });
                    }, { once: true });
                } else {
                    window.addEventListener('deviceorientation', handler);
                }
            }
        }

        function setGPS(id) {
            navigator.geolocation.getCurrentPosition(p => {
                const val = `${p.coords.latitude.toFixed(6)}, ${p.coords.longitude.toFixed(6)}`;
                document.getElementById(`${id}-coords`).value = val;
                pts[id] = { lat: p.coords.latitude, lng: p.coords.longitude };
                if(isLive) render();
            }, null, { enableHighAccuracy: true });
        }

        function updateManual(id) {
            const val = document.getElementById(`${id}-coords`).value;
            const parts = val.split(',').map(x => parseFloat(x.trim()));
            if (parts.length === 2 && !isNaN(parts[0])) {
                pts[id] = { lat: parts[0], lng: parts[1] };
                if(isLive) render();
            }
        }

        function generateMap() {
            if (!pts.start || !pts.target) return;
            isLive = true;
            render();
        }

        function render() {
            const box = document.getElementById('map-container');
            const w = box.clientWidth, h = box.clientHeight, pad = 50;
            const active = [pts.start, pts.target, pts.current].filter(Boolean);
            
            let minLat = Math.min(...active.map(p => p.lat));
            let maxLat = Math.max(...active.map(p => p.lat));
            let minLng = Math.min(...active.map(p => p.lng));
            let maxLng = Math.max(...active.map(p => p.lng));

            // Viewport Padding
            const latRange = Math.max(maxLat - minLat, 0.001);
            const lngRange = Math.max(maxLng - minLng, 0.001);
            
            const getX = (lng) => pad + ((lng - minLng) / lngRange) * (w - 2 * pad);
            const getY = (lat) => h - (pad + ((lat - minLat) / latRange) * (h - 2 * pad));

            // Update markers
            const draw = (id, pt) => {
                const el = document.getElementById(id);
                if (pt) {
                    el.classList.remove('hidden');
                    el.style.left = getX(pt.lng) + 'px';
                    el.style.top = getY(pt.lat) + 'px';
                }
            };

            draw('point-start', pts.start);
            draw('point-target', pts.target);
            draw('point-current', pts.current);

            // Accuracy Ring Scale
            const ring = document.getElementById('acc-ring');
            if (pts.current) {
                ring.classList.remove('hidden');
                ring.style.left = getX(pts.current.lng) + 'px';
                ring.style.top = getY(pts.current.lat) + 'px';
                // Simplified pixels per meter scaling
                const ringSize = Math.max(20, (accuracy / (latRange * 111000)) * h);
                ring.style.width = ringSize + 'px';
                ring.style.height = ringSize + 'px';
            }

            // Line
            const line = document.getElementById('path-line');
            if (pts.start && pts.target) {
                line.setAttribute('x1', getX(pts.start.lng));
                line.setAttribute('y1', getY(pts.start.lat));
                line.setAttribute('x2', getX(pts.target.lng));
                line.setAttribute('y2', getY(pts.target.lat));
            }

            // Dist
            if (pts.current && pts.target) {
                const d = calcDist(pts.current, pts.target);
                document.getElementById('data-dist').innerText = d > 1 ? d.toFixed(1) + 'km' : Math.round(d * 1000) + 'm';
            }
        }

        function calcDist(p1, p2) {
            const R = 6371;
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(p1.lat*Math.PI/180)*Math.cos(p2.lat*Math.PI/180)*Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        window.onload = init;
    </script>
</body>
</html>
