```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gyro Calibration Tool</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #050505; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: space-between;
            padding: 20px;
        }
        .overlay-btn {
            pointer-events: auto; padding: 15px 35px;
            background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0;
            color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #data-panel {
            pointer-events: auto;
            width: 100%; max-width: 320px;
            background: rgba(0, 10, 0, 0.95); border: 1px solid #0f0;
            color: #0f0; font-size: 13px; padding: 15px; border-radius: 8px;
        }
        .val { font-size: 20px; font-weight: bold; color: #fff; margin-bottom: 8px; }
        .axis-label { color: #0f0; opacity: 0.7; font-size: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="data-panel">
            <div class="axis-label">Alpha (Yaw / Compass)</div>
            <div id="val-alpha" class="val">0.00°</div>
            <div class="axis-label">Beta (Pitch / Tilt)</div>
            <div id="val-beta" class="val">0.00°</div>
            <div class="axis-label">Gamma (Roll / Steering)</div>
            <div id="val-gamma" class="val">0.00°</div>
            <hr style="border: 0; border-top: 1px solid #030; margin: 10px 0;">
            <div style="font-size: 10px; color: #aaa;">Target: Beta ~90, Gamma ~0 while upright</div>
        </div>

        <button id="start-btn" class="overlay-btn">Calibrate Upright Axis</button>
    </div>

    <script>
        let scene, camera, renderer, phoneProxy;
        let sensorData = { alpha: 0, beta: 0, gamma: 0 };

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
            camera.position.set(0, 0, 6);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Create a Phone Slab
            const geometry = new THREE.BoxGeometry(2, 4, 0.2);
            const material = new THREE.MeshPhongMaterial({ color: 0x111111, shininess: 100 });
            phoneProxy = new THREE.Mesh(geometry, material);
            
            // Screen side (Green)
            const screenGeom = new THREE.PlaneGeometry(1.8, 3.8);
            const screenMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.3 });
            const screen = new THREE.Mesh(screenGeom, screenMat);
            screen.position.z = 0.11;
            phoneProxy.add(screen);

            // Top marker (Red)
            const topGeom = new THREE.BoxGeometry(0.5, 0.1, 0.21);
            const topMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
            const top = new THREE.Mesh(topGeom, topMat);
            top.position.y = 2;
            phoneProxy.add(top);
            
            scene.add(phoneProxy);

            // Visual Helpers
            const grid = new THREE.GridHelper(10, 10, 0x004400, 0x002200);
            grid.rotation.x = Math.PI / 2;
            scene.add(grid);

            const light = new THREE.PointLight(0xffffff, 1);
            light.position.set(5, 5, 10);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x202020));

            document.getElementById('start-btn').addEventListener('click', startSensors);
            window.addEventListener('resize', onResize);
            animate();
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
            } else {
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
            document.getElementById('start-btn').style.display = 'none';
        }

        function handleOrientation(event) {
            sensorData.alpha = event.alpha || 0;
            sensorData.beta = event.beta || 0;
            sensorData.gamma = event.gamma || 0;

            document.getElementById('val-alpha').innerText = sensorData.alpha.toFixed(2) + '°';
            document.getElementById('val-beta').innerText = sensorData.beta.toFixed(2) + '°';
            document.getElementById('val-gamma').innerText = sensorData.gamma.toFixed(2) + '°';
        }

        function animate() {
            requestAnimationFrame(animate);

            // CONVERSION LOGIC FOR UPRIGHT PORTRAIT
            const a = THREE.MathUtils.degToRad(sensorData.alpha);
            const b = THREE.MathUtils.degToRad(sensorData.beta);
            const g = THREE.MathUtils.degToRad(sensorData.gamma);

            // To make the "Standing" position look correct, we need to adjust for the 90 degree tilt
            // of the Beta axis. We use YXZ order for stability in Portrait mode.
            const euler = new THREE.Euler(b, a, -g, 'YXZ');
            
            // Apply the sensor rotation
            phoneProxy.quaternion.setFromEuler(euler);

            // Crucial Adjustment:
            // The browser thinks a phone at beta=90 is "upright". 
            // We rotate our 3D model base by -90 on X so that it matches your physical reality.
            const offset = new THREE.Quaternion().setFromAxisAngle(new THREE.Vector3(1, 0, 0), -Math.PI / 2);
            phoneProxy.quaternion.premultiply(offset);

            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        init();
    </script>
</body>
</html>
