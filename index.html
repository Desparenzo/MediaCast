```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Gravity Sync + Log</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: radial-gradient(circle at center, #0f172a, #020617); font-family: sans-serif; touch-action: none; color: white; }
        .glass { backdrop-filter: blur(12px); background: rgba(15, 23, 42, 0.8); border: 1px solid rgba(255,255,255,0.1); }
        .neon-border { border: 1px solid rgba(59, 130, 246, 0.5); box-shadow: 0 0 15px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body>

    <!-- Setup Phase -->
    <div id="setupScreen" class="fixed inset-0 z-50 flex items-center justify-center p-8 text-center bg-slate-950">
        <div class="max-w-sm">
            <div class="w-16 h-16 bg-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center animate-pulse">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m0 11v1m-7-7H4m11 0h1m-7.071-7.071l.707.707M17 17l.707.707M6.343 17.657l-.707-.707M17.657 6.343l-.707-.707" />
                </svg>
            </div>
            <h1 class="text-3xl font-black mb-2 tracking-tighter italic">POSITION LOCK</h1>
            <p class="text-slate-400 text-sm mb-8">Hold your phone upright in your natural "active" position and tap below.</p>
            <button id="lockBtn" class="w-full bg-blue-600 hover:bg-blue-500 py-6 rounded-3xl font-black text-xl uppercase shadow-2xl transition-all">Lock Reference</button>
        </div>
    </div>

    <!-- Active Tuning Phase -->
    <div id="tunerUI" class="fixed inset-0 z-40 hidden flex flex-col justify-between p-6 pointer-events-none">
        <!-- Top HUD -->
        <div class="glass p-5 rounded-[2rem] text-center pointer-events-auto neon-border">
            <div class="text-[10px] font-bold text-blue-400 uppercase tracking-[0.3em] mb-1">Gravity Mode</div>
            <div class="text-3xl font-black italic" id="modeDisplay">1 / 6</div>
            <p class="text-[11px] text-slate-500 mt-2">Tilt phone. The white marble should fall toward the ground.</p>
        </div>

        <!-- Bottom Controls -->
        <div class="flex flex-col gap-3 pointer-events-auto">
            <div class="flex gap-3">
                <button id="cycleBtn" class="flex-1 bg-slate-800 py-5 rounded-2xl font-bold uppercase text-xs border border-white/10">Wrong Direction?</button>
                <button id="doneBtn" class="flex-1 bg-blue-600 py-5 rounded-2xl font-black uppercase text-xs shadow-lg">It's Perfect</button>
            </div>
        </div>
    </div>

    <!-- Final Log Modal -->
    <div id="logModal" class="fixed inset-0 z-[60] glass flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 w-full max-w-lg rounded-[2.5rem] p-8 border border-blue-500/30">
            <h2 class="text-2xl font-black text-blue-400 mb-2 italic">SYNC COMPLETE</h2>
            <p class="text-xs text-slate-400 mb-4 font-medium">This is the unique gravity profile for your device. Copy and send this to me.</p>
            <textarea id="logData" class="w-full h-64 bg-black/50 p-4 rounded-2xl font-mono text-[10px] text-emerald-400 border border-white/10 mb-6" readonly></textarea>
            <button id="copyBtn" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase shadow-lg">Copy Data</button>
        </div>
    </div>

    <div id="canvas-container" class="fixed inset-0 z-10"></div>

    <script>
        let scene, camera, renderer, marble, container;
        let ref = { a: 0, b: 0, g: 0 };
        let cur = { a: 0, b: 0, g: 0 };
        let mode = 0;
        let isActive = false;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Large Bowl
            const bowlGeom = new THREE.SphereGeometry(3.5, 32, 32);
            container = new THREE.Mesh(bowlGeom, new THREE.MeshPhongMaterial({ 
                color: 0x3b82f6, transparent: true, opacity: 0.1, wireframe: true 
            }));
            scene.add(container);

            // Marble
            marble = new THREE.Mesh(
                new THREE.SphereGeometry(0.5, 32, 32),
                new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xffffff, emissiveIntensity: 0.4 })
            );
            scene.add(marble);

            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            camera.position.z = 10;

            function animate() {
                requestAnimationFrame(animate);
                if (isActive) {
                    // Logic: Difference from reference
                    let db = cur.b - ref.b; // Pitch delta
                    let dg = cur.g - ref.g; // Roll delta
                    
                    let targetX = 0, targetY = 0;
                    const force = 0.08;

                    // 6 Modes of Gravity Mapping
                    switch(mode) {
                        case 0: targetX = dg;  targetY = -db; break;
                        case 1: targetX = -dg; targetY = db;  break;
                        case 2: targetX = db;  targetY = dg;  break;
                        case 3: targetX = -db; targetY = -dg; break;
                        case 4: targetX = dg;  targetY = db;  break;
                        case 5: targetX = -dg; targetY = -db; break;
                    }

                    // Apply constraints to keep marble in the bowl
                    const tx = THREE.MathUtils.clamp(targetX * force, -3, 3);
                    const ty = THREE.MathUtils.clamp(targetY * force, -3, 3);
                    
                    marble.position.x += (tx - marble.position.x) * 0.1;
                    marble.position.y += (ty - marble.position.y) * 0.1;
                    
                    // Add subtle rotation to container for feel
                    container.rotation.y += 0.005;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        async function start() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }
            window.addEventListener('deviceorientation', (e) => {
                cur = { a: e.alpha || 0, b: e.beta || 0, g: e.gamma || 0 };
            });

            // Delay for sensor stability
            setTimeout(() => {
                ref = { ...cur };
                isActive = true;
                document.getElementById('setupScreen').classList.add('hidden');
                document.getElementById('tunerUI').classList.remove('hidden');
            }, 200);
        }

        document.getElementById('lockBtn').onclick = start;
        
        document.getElementById('cycleBtn').onclick = () => {
            mode = (mode + 1) % 6;
            document.getElementById('modeDisplay').innerText = `${mode + 1} / 6`;
            marble.position.set(0, 0, 0);
        };

        document.getElementById('doneBtn').onclick = () => {
            const result = {
                device: navigator.userAgent,
                selectedMode: mode + 1,
                referenceLock: ref,
                finalSensors: cur,
                timestamp: new Date().toISOString()
            };
            document.getElementById('tunerUI').classList.add('hidden');
            document.getElementById('logModal').classList.remove('hidden');
            document.getElementById('logData').value = JSON.stringify(result, null, 2);
        };

        document.getElementById('copyBtn').onclick = () => {
            document.getElementById('logData').select();
            document.execCommand('copy');
            document.getElementById('copyBtn').innerText = "COPIED TO CLIPBOARD";
        };

        window.onload = init3D;
    </script>
</body>
</html>
