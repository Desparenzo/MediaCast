<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Tactical Shooter - Fixed Axis</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; user-select: none; -webkit-user-select: none; touch-action: none; }
        canvas { display: block; }
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; display: none; }
        #start-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50; display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(0,10,0,1); pointer-events: auto; }
        
        .pointer-events-auto { pointer-events: auto; }
        .hud-border { border: 1px solid rgba(34, 197, 94, 0.6); }
        .hud-text { color: #22c55e; text-shadow: 0 0 8px #22c55e; }
        
        #crosshair-dot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background-color: #22c55e; border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
        }
        #scope-reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65vw; height: 65vw; max-width: 450px; max-height: 450px;
            border: 2px solid #22c55e; border-radius: 50%; box-shadow: 0 0 30px rgba(34,197,94,0.4);
            display: none; background: radial-gradient(circle, transparent 40%, rgba(0,40,0,0.2) 100%);
        }
        #scope-reticle::before { content: ''; position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: rgba(34,197,94,0.8); }
        #scope-reticle::after { content: ''; position: absolute; top: 0; left: 50%; width: 1px; height: 100%; background: rgba(34,197,94,0.8); }

        .action-btn {
            width: 85px; height: 85px; border-radius: 50%;
            background: rgba(34, 197, 94, 0.1); border: 3px solid rgba(34, 197, 94, 0.6);
            display: flex; align-items: center; justify-content: center;
            color: #22c55e; font-weight: bold; font-size: 14px; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3);
            transition: all 0.1s;
        }
        .action-btn:active { background: rgba(34, 197, 94, 0.5); transform: scale(0.9); }
        .btn-red { border-color: #ef4444; color: #ef4444; background: rgba(239, 68, 68, 0.1); }

        #btn-scope { position: absolute; bottom: 50px; left: 30px; }
        #btn-fire { position: absolute; bottom: 50px; right: 30px; }

        #announcement {
            position: absolute; top: 35%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; font-size: 2.5rem; font-weight: bold; letter-spacing: 0.3em;
            opacity: 0; transition: opacity 0.4s; text-shadow: 0 0 20px #22c55e;
        }
    </style>
</head>
<body>

    <div id="start-screen">
        <h1 class="hud-text text-3xl font-bold mb-4 tracking-tighter">RE-CALIBRATING...</h1>
        <button id="btn-init" class="px-10 py-5 bg-green-900/30 border-2 border-green-500 hud-text rounded-lg hover:bg-green-500/20 transition-all">
            SYNC NEURAL LINK<br><span class="text-[10px] opacity-60">(ENABLE SENSORS)</span>
        </button>
    </div>

    <div id="ui-layer">
        <div id="announcement" class="hud-text">LEVEL 1</div>

        <div class="flex justify-between items-start p-6">
            <div class="hud-text bg-black/60 p-3 hud-border rounded backdrop-blur-md flex gap-6">
                <div>
                    <div class="text-[10px] opacity-60">PHASE</div>
                    <div id="level-display" class="text-xl font-bold italic">1</div>
                </div>
                <div>
                    <div class="text-[10px] opacity-60 text-red-400">HOSTILES</div>
                    <div id="enemy-count" class="text-xl font-bold text-red-500">0</div>
                </div>
            </div>
            <div class="hud-text bg-black/60 p-3 hud-border rounded text-right backdrop-blur-md">
                <div class="text-[10px] opacity-60">ZOOM</div>
                <div id="zoom-level" class="text-xl font-bold">1.0X</div>
            </div>
        </div>

        <div id="crosshair-dot"></div>
        <div id="scope-reticle"></div>

        <div id="btn-scope" class="action-btn pointer-events-auto">ZOOM</div>
        <div id="btn-fire" class="action-btn btn-red pointer-events-auto">FIRE</div>
    </div>

    <script>
        let scene, camera, renderer, enemyGroup;
        let sensorData = { alpha: 0, beta: 0, gamma: 0 };
        let isZoomed = false;
        let audioCtx;
        
        const PLAYER_HEIGHT = 1.78; 
        const ROOM_WIDTH = 20.0; 
        const ROOM_HEIGHT = 8.0; 
        const ROOM_DEPTH = 20.0;
        const DEFAULT_FOV = 70;
        const ZOOM_FOV = 22;

        const lasers = [], particles = [];
        const levels = [
            { id: 1, total: 5, concurrent: 3, speed: 0.35 },
            { id: 2, total: 10, concurrent: 5, speed: 0.6 },
            { id: 3, total: 15, concurrent: 7, speed: 1.0 },
            { id: 4, total: 25, concurrent: 9, speed: 1.5 },
            { id: 5, total: 40, concurrent: 12, speed: 2.1 }
        ];
        
        let currentLevel = 0;
        let state = 'start';
        let spawnedThisLevel = 0, killedThisLevel = 0, lastSpawnTime = 0;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(DEFAULT_FOV, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, PLAYER_HEIGHT, 0);
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createRoom();
            enemyGroup = new THREE.Group();
            scene.add(enemyGroup);

            window.addEventListener('resize', onWindowResize);
            document.getElementById('btn-init').addEventListener('click', startSystem);
            
            const fire = document.getElementById('btn-fire');
            const scope = document.getElementById('btn-scope');
            
            const handleFire = (e) => { e.preventDefault(); shoot(); };
            fire.addEventListener('touchstart', handleFire);
            fire.addEventListener('mousedown', handleFire);
            
            const handleScope = (e) => { e.preventDefault(); toggleScope(); };
            scope.addEventListener('touchstart', handleScope);
            scope.addEventListener('mousedown', handleScope);

            animate();
        }

        function createRoom() {
            const group = new THREE.Group();
            const halfW = ROOM_WIDTH / 2;
            const halfD = ROOM_DEPTH / 2;

            // Neon Illuminated Borders
            const boxGeom = new THREE.BoxGeometry(ROOM_WIDTH, ROOM_HEIGHT, ROOM_DEPTH);
            const edges = new THREE.EdgesGeometry(boxGeom);
            
            // Primary lines
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 });
            const wireframe = new THREE.LineSegments(edges, lineMat);
            wireframe.position.y = ROOM_HEIGHT / 2;
            group.add(wireframe);

            // "Glow" lines (thicker illuminated effect)
            const glowMat = new THREE.LineBasicMaterial({ color: 0x33ff33, transparent: true, opacity: 0.8 });
            const glowWireframe = new THREE.LineSegments(edges, glowMat);
            glowWireframe.position.y = ROOM_HEIGHT / 2;
            glowWireframe.scale.set(1.005, 1.005, 1.005);
            group.add(glowWireframe);

            // Tactical dots
            const dotMat = new THREE.PointsMaterial({ color: 0x004400, size: 0.04 });
            const positions = [];
            for(let x = -halfW; x <= halfW; x += 2) {
                for(let z = -halfD; z <= halfD; z += 2) {
                    positions.push(x, 0, z); // Floor
                    positions.push(x, ROOM_HEIGHT, z); // Ceiling
                }
            }
            const dotGeom = new THREE.BufferGeometry();
            dotGeom.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            group.add(new THREE.Points(dotGeom, dotMat));

            scene.add(group);
        }

        async function startSystem() {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', e => sensorData = e);
            } else {
                window.addEventListener('deviceorientation', e => sensorData = e);
            }
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            startNextLevel();
        }

        function startNextLevel() {
            if (currentLevel >= levels.length) {
                state = 'completed';
                document.getElementById('announcement').innerText = "MISSION COMPLETE";
                document.getElementById('announcement').style.opacity = 1;
                return;
            }
            state = 'transition';
            spawnedThisLevel = killedThisLevel = 0;
            const lvl = levels[currentLevel];
            document.getElementById('level-display').innerText = lvl.id;
            updateHUD();
            const announce = document.getElementById('announcement');
            announce.innerText = `LEVEL ${lvl.id}`;
            announce.style.opacity = 1;
            setTimeout(() => { announce.style.opacity = 0; state = 'playing'; }, 2000);
        }

        function updateHUD() {
            const config = levels[currentLevel];
            document.getElementById('enemy-count').innerText = config ? config.total - killedThisLevel : 0;
        }

        function playSfx(freq, slide, dur, type = 'sawtooth') {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const g = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(slide, audioCtx.currentTime + dur);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            osc.connect(g); g.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + dur);
        }

        function shoot() {
            if(state !== 'playing') return;
            playSfx(1000, 100, 0.1);
            const geom = new THREE.CylinderGeometry(0.01, 0.01, 2, 6);
            geom.rotateX(Math.PI / 2);
            const laser = new THREE.Mesh(geom, new THREE.MeshBasicMaterial({ color: 0xff4400 }));
            laser.position.copy(camera.position);
            laser.quaternion.copy(camera.quaternion);
            laser.translateY(-0.1); laser.translateZ(-0.5);
            scene.add(laser);
            lasers.push({ mesh: laser, dir: new THREE.Vector3(0,0,-1).applyQuaternion(camera.quaternion), life: 50 });

            const ray = new THREE.Raycaster();
            ray.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = ray.intersectObjects(enemyGroup.children, true);
            if (hits.length > 0) {
                let hit = hits[0].object;
                while(hit.parent !== enemyGroup) hit = hit.parent;
                if(hit && !hit.dead) {
                    hit.dead = true;
                    explode(hit.position, hit.type);
                    enemyGroup.remove(hit);
                    killedThisLevel++;
                    updateHUD();
                    if (killedThisLevel >= levels[currentLevel].total) {
                        currentLevel++; startNextLevel();
                    }
                }
            }
        }

        function toggleScope() {
            isZoomed = !isZoomed;
            camera.fov = isZoomed ? ZOOM_FOV : DEFAULT_FOV;
            camera.updateProjectionMatrix();
            document.getElementById('zoom-level').innerText = isZoomed ? '3.5X' : '1.0X';
            document.getElementById('scope-reticle').style.display = isZoomed ? 'block' : 'none';
            document.getElementById('crosshair-dot').style.display = isZoomed ? 'none' : 'block';
        }

        function spawnEnemy(speedMult) {
            const group = new THREE.Group();
            const type = Math.random() > 0.4 ? 'mosquito' : 'ufo';
            group.type = type;
            group.dead = false;

            if(type === 'mosquito') {
                const b = new THREE.Mesh(new THREE.IcosahedronGeometry(0.12, 0), new THREE.MeshBasicMaterial({ color: 0xff0000 }));
                const o = new THREE.LineSegments(new THREE.EdgesGeometry(b.geometry), new THREE.LineBasicMaterial({ color: 0xffff00 }));
                o.scale.set(1.2, 1.2, 1.2);
                group.add(b, o);
                group.vx = (Math.random()-0.5) * 0.06 * speedMult;
                group.vy = (Math.random()-0.5) * 0.06 * speedMult;
                group.vz = (Math.random()-0.5) * 0.06 * speedMult;
            } else {
                const b = new THREE.Mesh(new THREE.CylinderGeometry(0.25, 0.25, 0.1, 8), new THREE.MeshBasicMaterial({ color: 0x00ff00 }));
                const o = new THREE.LineSegments(new THREE.EdgesGeometry(b.geometry), new THREE.LineBasicMaterial({ color: 0x88ff88 }));
                o.scale.set(1.1, 1.1, 1.1);
                group.add(b, o);
                group.vx = (Math.random()-0.5) * 0.04 * speedMult;
                group.vy = 0; group.vz = (Math.random()-0.5) * 0.04 * speedMult;
                group.baseY = 1 + Math.random()*5; group.t = Math.random()*10;
            }

            const r = 6 + Math.random()*8, a = Math.random()*Math.PI*2;
            group.position.set(Math.cos(a)*r, 1 + Math.random()*(ROOM_HEIGHT-2), Math.sin(a)*r);
            enemyGroup.add(group);
        }

        function explode(pos, type) {
            playSfx(150, 40, 0.3, 'square');
            const col = type === 'ufo' ? 0x00ff00 : 0xff0000;
            for(let i=0; i<12; i++) {
                const p = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.08,0.08), new THREE.MeshBasicMaterial({ color: col }));
                p.position.copy(pos); scene.add(p);
                particles.push({ mesh:p, v:new THREE.Vector3((Math.random()-0.5)*0.25, (Math.random()-0.5)*0.25, (Math.random()-0.5)*0.25), life:30 });
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate(time) {
            requestAnimationFrame(animate);

            if (sensorData) {
                // SENSOR CORRECTION
                // beta is pitch (X rotation), alpha is yaw (Y rotation), gamma is roll (Z rotation)
                // We use -Math.PI/2 to compensate for phone being held upright
                const pitch = THREE.MathUtils.degToRad(sensorData.beta) - Math.PI/2;
                const yaw = -THREE.MathUtils.degToRad(sensorData.alpha);
                const roll = -THREE.MathUtils.degToRad(sensorData.gamma);
                camera.rotation.set(pitch, yaw, roll, 'YXZ');
            }

            if (state === 'playing') {
                const cfg = levels[currentLevel];
                if (spawnedThisLevel < cfg.total && enemyGroup.children.length < cfg.concurrent && time - lastSpawnTime > 1200) {
                    spawnEnemy(cfg.speed); spawnedThisLevel++; lastSpawnTime = time;
                }
                const bw = ROOM_WIDTH/2 - 0.5, bd = ROOM_DEPTH/2 - 0.5;
                enemyGroup.children.forEach(e => {
                    e.position.x += e.vx; e.position.z += e.vz;
                    if(e.type === 'mosquito') { e.position.y += e.vy; if(e.position.y > ROOM_HEIGHT-1 || e.position.y < 1) e.vy *= -1; }
                    else { e.t += 0.04; e.position.y = e.baseY + Math.sin(e.t)*0.5; }
                    if(Math.abs(e.position.x) > bw) e.vx *= -1;
                    if(Math.abs(e.position.z) > bd) e.vz *= -1;
                    e.rotation.y += 0.03;
                });
            }

            lasers.forEach((l, i) => { 
                l.mesh.position.addScaledVector(l.dir, 0.7); l.life--; 
                if(l.life <= 0) { scene.remove(l.mesh); lasers.splice(i, 1); }
            });
            particles.forEach((p, i) => {
                p.mesh.position.add(p.v); p.mesh.scale.multiplyScalar(0.9); p.life--;
                if(p.life <= 0) { scene.remove(p.mesh); particles.splice(i, 1); }
            });

            renderer.render(scene, camera);
        }
        init();
    </script>
</body>
</html>
