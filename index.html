```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Standing Viewport - Fixed Axes</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }
        .overlay-btn {
            pointer-events: auto; margin-top: 45vh; padding: 15px 35px;
            background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0;
            color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 11px;
            background: rgba(0,20,0,0.85); padding: 12px; border: 1px solid #0f0;
            border-radius: 4px; line-height: 1.5;
        }
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 50px; height: 50px; border: 1px solid rgba(0, 255, 0, 0.2); border-radius: 50%;
        }
        #reticle::after { content: ''; position: absolute; top: 50%; left: 50%; width: 6px; height: 6px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); box-shadow: 0 0 8px #0f0; }
    </style>
</head>
<body>

    <div id="ui">
        <div id="reticle"></div>
        <button id="start-btn" class="overlay-btn">Sync Neural Link</button>
        <div id="hud">SYSTEM: STANDBY<br>AWAITING SENSOR CALIBRATION</div>
    </div>

    <script>
        let scene, camera, renderer;
        let sensor = { alpha: 0, beta: 0, gamma: 0 };
        const eyeHeight = 1.65;

        // Base world rotation to align "Forward" with the phone held upright
        const q_world = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); 
        const q_sensor = new THREE.Quaternion();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, eyeHeight, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.body.appendChild(renderer.domElement);

            buildEnvironment();
            
            document.getElementById('start-btn').addEventListener('click', start);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        function buildEnvironment() {
            const size = 20;
            const height = 8;

            // Ground & Ceiling Grids
            const grid = new THREE.GridHelper(size, 20, 0x00ff00, 0x002200);
            scene.add(grid);
            const ceil = grid.clone();
            ceil.position.y = height;
            scene.add(ceil);

            // Room Wireframe
            const boxGeom = new THREE.BoxGeometry(size, height, size);
            const edges = new THREE.EdgesGeometry(boxGeom);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.4 });
            const room = new THREE.LineSegments(edges, lineMat);
            room.position.y = height / 2;
            scene.add(room);

            // Compass Pillars
            const createPillar = (x, z, col) => {
                const pGeom = new THREE.CylinderGeometry(0.1, 0.1, height, 12);
                const pMat = new THREE.MeshBasicMaterial({ color: col });
                const p = new THREE.Mesh(pGeom, pMat);
                p.position.set(x, height/2, z);
                scene.add(p);
            };

            createPillar(0, -9.8, 0xff0000); // NORTH (Red)
            createPillar(9.8, 0, 0x00ff00);  // EAST (Green)
            createPillar(-9.8, 0, 0x0000ff); // WEST (Blue)
            createPillar(0, 9.8, 0xffffff);  // SOUTH (White)
        }

        async function start() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') return;
            }
            
            window.addEventListener('deviceorientation', (e) => {
                sensor.alpha = e.alpha || 0;
                sensor.beta = e.beta || 0;
                sensor.gamma = e.gamma || 0;
            }, true);

            document.getElementById('start-btn').style.display = 'none';
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // AXIS REMAPPING FOR PORTRAIT STANDING
            // Based on user feedback:
            // Gamma seems to be the Horizontal Panning (Yaw)
            // Alpha seems to be the Side-to-Side Tilting (Roll)
            // Beta remains Forward/Backward (Pitch)
            
            const roll  = THREE.MathUtils.degToRad(sensor.alpha); 
            const pitch = THREE.MathUtils.degToRad(sensor.beta);  
            const yaw   = THREE.MathUtils.degToRad(sensor.gamma); 

            // Use 'YXZ' order to ensure turning the body is the primary transformation
            const euler = new THREE.Euler(pitch, yaw, -roll, 'YXZ');
            q_sensor.setFromEuler(euler);

            camera.quaternion.copy(q_world);
            camera.quaternion.multiply(q_sensor);

            // HUD Diagnostics
            document.getElementById('hud').innerHTML = `
                SENSORS: CALIBRATED<br>
                PAN (GAMMA): ${Math.round(sensor.gamma)}°<br>
                TILT (BETA): ${Math.round(sensor.beta)}°<br>
                ROLL (ALPHA): ${Math.round(sensor.alpha)}°
            `;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
