<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>360 VR Window</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;

        }
        .btn {
            padding: 15px 30px;
            background: #4285f4;

            border: none;

        .btn:active { transform: scale(0.95); }
        #instructions {

            pointer-events: none;

        #status { position: absolute; bottom: 20px; font-size: 12px; opacity: 0.7; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <button id="start-btn" class="btn">Enable VR Mode</button>
        <div id="instructions">
            Tap to enable movement sensors.<br>
            Then rotate your phone like a window!
        </div>
        <div id="status">Sensors: Waiting...</div>
    </div>

    <script>
        let scene, camera, renderer, sphere;
        let isMoving = false;
        
        // Target rotation for smoothing
        let targetRotation = new THREE.Euler(0, 0, 0, 'YXZ');
        let currentRotation = new THREE.Euler(0, 0, 0, 'YXZ');

        function init() {
            // 1. Create Scene
            scene = new THREE.Scene();

            // 2. Setup Camera (FOV of 75 is standard for mobile "window" feel)
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.rotation.order = 'YXZ';

            // 3. Create the 360 World
            // We use a large sphere and flip it inside out using scale.x = -1
            const geometry = new THREE.SphereGeometry(500, 60, 40);
            geometry.scale(-1, 1, 1);

            // Create a procedural grid texture as a "Virtual World" fallback
            const canvas = document.createElement('canvas');
            canvas.width = 2048;
            canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            
            // Background
            ctx.fillStyle = '#1a1a1a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid lines
            ctx.strokeStyle = '#4285f4';
            ctx.lineWidth = 2;
            for(let i=0; i<=2048; i+=128) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, 1024); ctx.stroke();
            }
            for(let j=0; j<=1024; j+=128) {
                ctx.beginPath(); ctx.moveTo(0, j); ctx.lineTo(2048, j); ctx.stroke();
            }

            // Labels for orientation
            ctx.fillStyle = "white";
            ctx.font = "bold 80px Arial";
            ctx.fillText("NORTH", 1024, 512);
            ctx.fillText("SOUTH", 0, 512);
            ctx.fillText("SOUTH", 2048, 512);
            ctx.fillText("ZENITH (SKY)", 1024, 100);
            ctx.fillText("NADIR (GROUND)", 1024, 950);

            const texture = new THREE.CanvasTexture(canvas);
            const material = new THREE.MeshBasicMaterial({ map: texture });
            sphere = new THREE.Mesh(geometry, material);
            scene.add(sphere);

            // 4. Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            window.addEventListener('resize', onWindowResize, false);
            
            // Fallback: Mouse movement for desktop users
            document.addEventListener('mousemove', (e) => {
                if (!isMoving) { // Only if mobile sensors aren't active
                    const lon = (e.clientX / window.innerWidth - 0.5) * Math.PI * 2;
                    const lat = (e.clientY / window.innerHeight - 0.5) * Math.PI;
                    targetRotation.y = -lon;
                    targetRotation.x = lat;
                }
            });

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function handleOrientation(event) {
            isMoving = true;
            document.getElementById('status').innerText = "Sensors: Active";
            document.getElementById('instructions').style.display = 'none';

            // DeviceOrientation gives angles in degrees
            // Alpha: around Z (compass), Beta: around X (front-back), Gamma: around Y (left-right)
            const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0; // Z
            const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;   // X
            const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0; // Y

            // This math aligns the phone's orientation with the 3D camera
            // We use YXZ order to prevent gimbal lock
            targetRotation.set(beta, alpha, -gamma);
        }

        async function requestPermissions() {
            const btn = document.getElementById('start-btn');
            
            // Feature detection for iOS 13+ permission request
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        btn.style.display = 'none';
                    } else {
                        alert("Permission denied. You'll have to use your mouse.");
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Non-iOS or older devices
                window.addEventListener('deviceorientation', handleOrientation);
                btn.style.display = 'none';
                document.getElementById('status').innerText = "Sensors: Listening...";
            }
        }

        function animate() {
            requestAnimationFrame(animate);

            // Smooth interpolation (Lerp) for a premium feel
            currentRotation.x += (targetRotation.x - currentRotation.x) * 0.1;
            currentRotation.y += (targetRotation.y - currentRotation.y) * 0.1;
            currentRotation.z += (targetRotation.z - currentRotation.z) * 0.1;

            camera.rotation.copy(currentRotation);
            renderer.render(scene, camera);
        }

        window.onload = () => {
            init();
            document.getElementById('start-btn').addEventListener('click', requestPermissions);
        };
    </script>
</body>
</html>
