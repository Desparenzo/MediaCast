<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fixed AR Panning Anchor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: ui-monospace, monospace; }
        canvas { display: block; }
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            z-index: 100;
        }
        .stats {
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 10px;
            color: #444;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
        }
        .btn {
            background: #000;
            color: #fff;
            padding: 14px 28px;
            border-radius: 16px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        #overlay {
            position: fixed;
            inset: 0;
            background: white;
            z-index: 200;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <h1 class="text-3xl font-black mb-2 tracking-tight">Panning Anchor</h1>
        <p class="text-gray-400 mb-8 px-6">The pillar should stay still while you rotate.</p>
        <button onclick="requestAccess()" class="bg-black text-white px-12 py-4 rounded-full font-bold shadow-2xl">Start Panning</button>
    </div>

    <div class="hud">
        <div class="stats">
            <span class="opacity-50">ALPHA SENSOR:</span> 
            <span id="s-a">0</span>
            <div class="mt-1">
                <span class="opacity-50">WORLD OFFSET:</span> 
                <span id="w-a">0</span> rad
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="reset()" class="btn">RESET FORWARD</button>
    </div>

    <script>
        let scene, camera, renderer, worldGroup;
        let sensorAlpha = 0;
        let offsetAlpha = 0;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 2; // Camera is at 2 units back

            // worldGroup contains everything (grid + pillar)
            worldGroup = new THREE.Group();
            scene.add(worldGroup);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // 1. ADD THE GRID (Floor)
            const grid = new THREE.GridHelper(50, 40, 0xdddddd, 0xeeeeee);
            grid.position.y = -2;
            worldGroup.add(grid);

            // 2. ADD THE PILAR (Diagnostic Target)
            const pillarGeom = new THREE.BoxGeometry(0.5, 4, 0.5); // 0.5x4x0.5
            const pillarMat = new THREE.MeshBasicMaterial({ color: 0xcccccc }); // Light Gray
            const pillar = new THREE.Mesh(pillarGeom, pillarMat);
            pillar.position.set(0, 0, -5); // 5 units in front (Z is depth)
            worldGroup.add(pillar);

            // Light for visibility (though we use BasicMaterial)
            const ambient = new THREE.AmbientLight(0xffffff, 1);
            scene.add(ambient);

            window.addEventListener('resize', onWindowResize);
            animate();
        }

        function requestAccess() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') start();
                });
            } else {
                start();
            }
        }

        function start() {
            document.getElementById('overlay').style.display = 'none';
            window.addEventListener('deviceorientation', (e) => {
                // We are only capturing the compass rotation (Alpha)
                sensorAlpha = e.alpha || 0;
            });
            init();
        }

        function reset() {
            // Sets the current heading as the new '0' forward
            offsetAlpha = sensorAlpha;
        }

        function animate() {
            requestAnimationFrame(animate);

            if (worldGroup) {
                const degToRad = Math.PI / 180;
                
                // Subtract calibration offset to get relative heading
                const relativeAlpha = (sensorAlpha - offsetAlpha) * degToRad;

                // INVERSION FIX:
                // To counteract phone panning left (+Alpha), the world 
                // must rotate right by the same amount.
                const finalAlphaOffset = -relativeAlpha;

                // We apply this only to the world's Y (Yaw) axis
                worldGroup.rotation.y = finalAlphaOffset;

                document.getElementById('s-a').innerText = sensorAlpha.toFixed(1);
                document.getElementById('w-a').innerText = finalAlphaOffset.toFixed(2);
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
