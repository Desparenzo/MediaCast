```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyro Sensor Tester</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body class="text-white">

    <!-- UI Overlay -->
    <div class="fixed inset-0 pointer-events-none flex flex-col p-6 z-10">
        <header class="flex justify-between items-start w-full pointer-events-auto">
            <div>
                <h1 class="text-2xl font-bold tracking-tight">Gyroscope Tester</h1>
                <p class="text-slate-400 text-sm">Real-time IMU Data</p>
            </div>
            <button id="permissionBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded-lg font-medium transition-all shadow-lg pointer-events-auto hidden">
                Enable Sensors
            </button>
        </header>

        <div class="mt-auto grid grid-cols-1 md:grid-cols-3 gap-4 pointer-events-auto">
            <!-- Pitch -->
            <div class="glass p-4 rounded-2xl">
                <div class="text-xs font-bold text-blue-400 uppercase tracking-wider mb-1">Pitch (X)</div>
                <div class="flex items-baseline gap-2">
                    <span id="pitchVal" class="text-3xl font-mono">0.0°</span>
                </div>
                <div class="w-full bg-slate-700 h-1 mt-3 rounded-full overflow-hidden">
                    <div id="pitchBar" class="bg-blue-500 h-full transition-all duration-75" style="width: 50%"></div>
                </div>
            </div>

            <!-- Roll -->
            <div class="glass p-4 rounded-2xl">
                <div class="text-xs font-bold text-emerald-400 uppercase tracking-wider mb-1">Roll (Z)</div>
                <div class="flex items-baseline gap-2">
                    <span id="rollVal" class="text-3xl font-mono">0.0°</span>
                </div>
                <div class="w-full bg-slate-700 h-1 mt-3 rounded-full overflow-hidden">
                    <div id="rollBar" class="bg-emerald-500 h-full transition-all duration-75" style="width: 50%"></div>
                </div>
            </div>

            <!-- Yaw -->
            <div class="glass p-4 rounded-2xl">
                <div class="text-xs font-bold text-amber-400 uppercase tracking-wider mb-1">Yaw / Alpha (Y)</div>
                <div class="flex items-baseline gap-2">
                    <span id="yawVal" class="text-3xl font-mono">0.0°</span>
                </div>
                <div class="w-full bg-slate-700 h-1 mt-3 rounded-full overflow-hidden">
                    <div id="yawBar" class="bg-amber-500 h-full transition-all duration-75" style="width: 50%"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="canvas-container" class="fixed inset-0"></div>

    <script>
        let scene, camera, renderer, phone;
        let sensorActive = false;

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Create Smartphone Shape
            const geometry = new THREE.BoxGeometry(2.2, 4.5, 0.2);
            
            // Multi-material for screen and back
            const materials = [
                new THREE.MeshPhongMaterial({ color: 0x1e293b }), // sides
                new THREE.MeshPhongMaterial({ color: 0x1e293b }), // sides
                new THREE.MeshPhongMaterial({ color: 0x1e293b }), // top
                new THREE.MeshPhongMaterial({ color: 0x1e293b }), // bottom
                new THREE.MeshPhongMaterial({ color: 0x3b82f6 }), // screen (front)
                new THREE.MeshPhongMaterial({ color: 0x334155 })  // back
            ];

            phone = new THREE.Mesh(geometry, materials);
            scene.add(phone);

            // Add detail: "Screen" glow/border
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x60a5fa }));
            phone.add(line);

            // Lights
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
            directionalLight.position.set(5, 10, 7.5);
            scene.add(directionalLight);

            camera.position.z = 7;

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            // If no sensor, slow auto-rotate to show it's working
            if (!sensorActive) {
                phone.rotation.y += 0.01;
                phone.rotation.x = -0.5;
            }
            
            renderer.render(scene, camera);
        }

        function updateData(alpha, beta, gamma) {
            sensorActive = true;
            
            // Convert to Radians for Three.js
            // alpha = yaw (0-360), beta = pitch (-180, 180), gamma = roll (-90, 90)
            const pitchRad = THREE.MathUtils.degToRad(beta);
            const rollRad = THREE.MathUtils.degToRad(gamma);
            const yawRad = THREE.MathUtils.degToRad(alpha);

            // Set rotation
            phone.rotation.set(pitchRad, yawRad, rollRad);

            // Update UI
            document.getElementById('pitchVal').innerText = beta.toFixed(1) + '°';
            document.getElementById('rollVal').innerText = gamma.toFixed(1) + '°';
            document.getElementById('yawVal').innerText = alpha.toFixed(1) + '°';

            // Bars calculation (normalized to 100%)
            document.getElementById('pitchBar').style.width = ((beta + 90) / 180 * 100) + '%';
            document.getElementById('rollBar').style.width = ((gamma + 90) / 180 * 100) + '%';
            document.getElementById('yawBar').style.width = (alpha / 360 * 100) + '%';
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        document.getElementById('permissionBtn').classList.add('hidden');
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                // Non-iOS or older browsers
                window.addEventListener('deviceorientation', handleOrientation);
                document.getElementById('permissionBtn').classList.add('hidden');
            }
        }

        function handleOrientation(event) {
            const alpha = event.alpha || 0; // z-axis (yaw)
            const beta = event.beta || 0;   // x-axis (pitch)
            const gamma = event.gamma || 0; // y-axis (roll)
            updateData(alpha, beta, gamma);
        }

        window.onload = () => {
            init3D();
            
            // Check if we need to show permission button
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('permissionBtn').classList.remove('hidden');
                document.getElementById('permissionBtn').addEventListener('click', requestPermission);
            } else {
                // Try to start automatically for standard browsers
                window.addEventListener('deviceorientation', handleOrientation);
            }
        };
    </script>
</body>
</html>
