    <div id="canvas-container" class="fixed inset-0 z-0"></div>

    <script>
        let scene, camera, renderer, ball, outerSphere;
        let sensorData = { alpha:0, beta:0, gamma:0, accX:0, accY:0, accZ:0, mag:0 };
        let offset = { x: 0, y: 0 };
        let velocity = { x: 0, y: 0 };
        let history = [];

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // 360 Environment Sphere (Smaller to fit)
            const envGeom = new THREE.SphereGeometry(4, 32, 32);
            const envMat = new THREE.MeshStandardMaterial({ 
                color: 0x1e293b, wireframe: true, transparent: true, opacity: 0.2 
            });
            outerSphere = new THREE.Mesh(envGeom, envMat);
            scene.add(outerSphere);

            // Heavy Metallic Ball
            const ballGeom = new THREE.SphereGeometry(0.6, 32, 32);
            const ballMat = new THREE.MeshStandardMaterial({ 
                color: 0xffffff, metalness: 1.0, roughness: 0.1, emissive: 0x334155, emissiveIntensity: 0.2
            });
            ball = new THREE.Mesh(ballGeom, ballMat);
            scene.add(ball);

            // Lights
            const p1 = new THREE.PointLight(0x3b82f6, 2, 50); p1.position.set(5, 5, 5); scene.add(p1);
            const p2 = new THREE.PointLight(0xffffff, 1, 50); p2.position.set(-5, -5, 5); scene.add(p2);
            scene.add(new THREE.AmbientLight(0xffffff, 0.2));

            camera.position.z = 10;

            function animate() {
                requestAnimationFrame(animate);
                
                // Physics constants for "Heavy" ball
                const gravityScale = 0.025;
                const friction = 0.95;
                
                // Calculate pull using Gyro + Offsets
                let targetX = (sensorData.gamma + offset.x) * (Math.PI / 180);
                let targetY = (sensorData.beta + offset.y) * (Math.PI / 180);

                velocity.x += targetX * gravityScale;
                velocity.y -= targetY * gravityScale;
                
                velocity.x *= friction;
                velocity.y *= friction;

                ball.position.x += velocity.x;
                ball.position.y += velocity.y;

                // Circular Constraint (3.4 radius = outer 4.0 - ball 0.6)
                const d = Math.sqrt(ball.position.x**2 + ball.position.y**2);
                if (d > 3.4) {
                    const angle = Math.atan2(ball.position.y, ball.position.x);
                    ball.position.x = Math.cos(angle) * 3.4;
                    ball.position.y = Math.sin(angle) * 3.4;
                    velocity.x *= -0.3; // Heavy thud bounce
                    velocity.y *= -0.3;
                }

                // Visual Error display (Calculated by Acc vs Gyro deviation)
                const error = Math.abs(sensorData.accX - targetX * 10) + Math.abs(sensorData.accY - targetY * 10);
                document.getElementById('errVal').innerText = (error * 5).toFixed(2) + "%";

                renderer.render(scene, camera);
            }
            animate();
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }

            // Orientation Listener
            window.addEventListener('deviceorientation', (e) => {
                sensorData.alpha = e.alpha || 0;
                sensorData.beta = e.beta || 0;
                sensorData.gamma = e.gamma || 0;
            });

            // Accelerometer Listener (Real-time Gravity)
            window.addEventListener('devicemotion', (e) => {
                sensorData.accX = e.accelerationIncludingGravity.x || 0;
                sensorData.accY = e.accelerationIncludingGravity.y || 0;
                sensorData.accZ = e.accelerationIncludingGravity.z || 0;
            });

            document.getElementById('intro').classList.add('hidden');
            document.getElementById('workspace').classList.remove('hidden');
        }

        // FUSION RE-ALIGNMENT
        // Uses the Accelerometer's absolute gravity vector to recalibrate the Gyro
        document.getElementById('fixBtn').onclick = () => {
            // Acc reports where Earth actually is
            // Gamma is horizontal tilt, Beta is vertical tilt
            // We adjust offsets so that Current Sensor + Offset = Acc Vector
            offset.x = -(sensorData.gamma + (sensorData.accX * 9));
            offset.y = -(sensorData.beta - (sensorData.accY * 9));
            
            // Log the correction for debugging
            history.push({
                type: "CORRECTION",
                acc: {x: sensorData.accX, y: sensorData.accY},
                gyro: {b: sensorData.beta, g: sensorData.gamma},
                newOffset: {...offset}
            });

            // Flash the UI
            const btn = document.getElementById('fixBtn');
            btn.innerText = "ALIGNED!";
            setTimeout(() => btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg> Wrong Direction? Fix Now`, 1000);
        };

        document.getElementById('exportBtn').onclick = () => {
            const dump = {
                finalOffset: offset,
                lastSensorState: sensorData,
                correctionCount: history.length,
                history: history,
                ua: navigator.userAgent
            };
            document.getElementById('logText').value = JSON.stringify(dump, null, 2);
            document.getElementById('logModal').classList.remove('hidden');
        };

        document.getElementById('copyBtn').onclick = () => {
            document.getElementById('logText').select();
            document.execCommand('copy');
            document.getElementById('copyBtn').innerText = "COPIED!";
        };

        window.onload = init3D;
        document.getElementById('startBtn').onclick = startSensors;
    </script>
</body>
