<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Photos Logic Test</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        .ui { position: absolute; inset: 0; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .glass { background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); color: white; padding: 15px; border-radius: 20px; pointer-events: auto; }
    </style>
</head>
<body>

    <div id="setup" class="fixed inset-0 bg-white z-[1000] flex items-center justify-center p-10 text-center">
        <div>
            <h1 class="text-3xl font-bold mb-4">Sensor Fusion</h1>
            <p class="mb-8 text-gray-500 text-sm">Mimicking Google's 360 viewer logic using Vector Projection.</p>
            <button onclick="init()" class="bg-blue-600 text-white px-10 py-4 rounded-full font-bold">Start Tracking</button>
        </div>
    </div>

    <div class="ui">
        <div class="flex justify-between items-start">
            <div class="glass text-[10px] uppercase tracking-tighter opacity-80">
                <div id="orient-label">Detecting Position...</div>
                <div class="mt-1 font-mono">Yaw: <span id="yaw-val">0</span>°</div>
            </div>
        </div>
        
        <div class="flex justify-center">
            <button onclick="resetYaw()" class="glass px-8 py-4 font-bold border border-white/20">RESET CENTER</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, world;
        let deviceQ = new THREE.Quaternion();
        let worldOffset = 0;
        let isStarted = false;

        function init() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(response => {
                    if (response == 'granted') setup();
                });
            } else {
                setup();
            }
        }

        function setup() {
            document.getElementById('setup').style.display = 'none';
            
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            world = new THREE.Group();
            scene.add(world);

            // Create the "360 Environment"
            // Pillar at North
            const pillar = new THREE.Mesh(
                new THREE.BoxGeometry(0.5, 6, 0.5),
                new THREE.MeshBasicMaterial({ color: 0x00ff00 })
            );
            pillar.position.set(0, 0, -8);
            world.add(pillar);

            // Helpers
            const grid = new THREE.GridHelper(100, 40, 0x333333, 0x222222);
            grid.position.y = -3;
            world.add(grid);

            window.addEventListener('deviceorientation', handleOrientation);
            window.addEventListener('resize', onResize);
            isStarted = true;
            animate();
        }

        function handleOrientation(e) {
            const alpha = e.alpha ? THREE.MathUtils.degToRad(e.alpha) : 0;
            const beta = e.beta ? THREE.MathUtils.degToRad(e.beta) : 0;
            const gamma = e.gamma ? THREE.MathUtils.degToRad(e.gamma) : 0;

            // Google Logic: Don't use angles, use the Phone's Look Vector
            // We build the full 3D orientation first
            const euler = new THREE.Euler(beta, alpha, -gamma, 'YXZ');
            deviceQ.setFromEuler(euler);
        }

        function resetYaw() {
            worldOffset = calculateProjectedYaw();
        }

        function calculateProjectedYaw() {
            // 1. Point a vector out the back of the phone
            const lookVector = new THREE.Vector3(0, 0, -1);
            lookVector.applyQuaternion(deviceQ);

            // 2. Project it onto the XZ (Floor) plane
            // 3. Find the angle of that projection (The True Panning)
            return Math.atan2(lookVector.x, -lookVector.z);
        }

        function animate() {
            requestAnimationFrame(animate);
            if (isStarted) {
                const currentYaw = calculateProjectedYaw();
                
                // Keep the world still by rotating it opposite to our panning
                world.rotation.y = -(currentYaw - worldOffset);

                // HUD updates
                document.getElementById('yaw-val').innerText = (world.rotation.y * (180/Math.PI)).toFixed(1);
                
                const beta = new THREE.Euler().setFromQuaternion(deviceQ).x;
                document.getElementById('orient-label').innerText = 
                    Math.abs(beta) > 1 ? "Upright (Camera Mode)" : "Flat (Table Mode)";
            }
            renderer.render(scene, camera);
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
    </script>
</body>
</html>
