```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>IMDB Movies</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            background-color: #05070a;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
        }
        .glass-input:focus {
            border-color: #f5c518;
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-primary {
            background-color: #f5c518;
            color: #000;
            transition: all 0.2s ease;
        }
        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.9;
        }
        .code-badge {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #modalOverlay {
            transition: opacity 0.2s ease;
        }
        .modal-hidden {
            opacity: 0;
            pointer-events: none;
        }
    </style>
</head>
<body class="antialiased overflow-hidden">

    <!-- Top Bar: Status and Wireless Trigger -->
    <div class="fixed top-0 left-0 w-full p-4 flex items-center justify-between z-30">
        <div class="flex items-center space-x-2">
            <!-- Subtle Device Code -->
            <div class="code-badge px-3 py-1.5 rounded-lg flex items-center space-x-2">
                <div id="statusDot" class="w-1.5 h-1.5 rounded-full bg-red-500 animate-pulse"></div>
                <span id="deviceCode" class="font-mono text-xs text-slate-400 tracking-widest uppercase">Connecting...</span>
            </div>
            
            <!-- Paste Wireless Button (Beside code) -->
            <button id="openWirelessBtn" class="code-badge p-1.5 rounded-lg text-slate-400 hover:text-yellow-500 transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"></path><path d="M1.42 9a16 16 0 0 1 21.16 0"></path><path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path><line x1="12" y1="20" x2="12.01" y2="20"></line></svg>
            </button>
        </div>
    </div>

    <!-- Main Hero Content -->
    <main class="flex-grow flex flex-col items-center justify-center p-6 space-y-8">
        <div class="text-center space-y-2">
            <h1 class="text-3xl font-bold tracking-tight text-white/90">IMDB Movies</h1>
        </div>

        <div class="w-full max-w-md space-y-4">
            <div class="relative group">
                <input 
                    type="text" 
                    id="localInput" 
                    placeholder="Paste link here" 
                    class="w-full glass-input rounded-2xl px-6 py-5 text-lg text-white focus:outline-none transition-all text-center placeholder:text-slate-600"
                />
            </div>
            <button id="playBtn" class="w-full btn-primary font-bold text-lg py-5 rounded-2xl shadow-2xl shadow-yellow-500/10">
                Play
            </button>
        </div>
    </main>

    <!-- Wireless Casting Popup -->
    <div id="modalOverlay" class="fixed inset-0 bg-black/90 backdrop-blur-md modal-hidden flex items-center justify-center p-6 z-50">
        <div class="w-full max-w-sm space-y-6">
            <div class="flex items-center justify-between">
                <h2 class="text-xl font-semibold">Wireless Send</h2>
                <button id="closeModal" class="text-slate-500 hover:text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                </button>
            </div>

            <div class="space-y-4">
                <input 
                    type="tel" 
                    id="remoteCode" 
                    placeholder="Enter 6-digit TV code" 
                    maxlength="6"
                    class="w-full glass-input rounded-xl px-4 py-4 text-center text-2xl font-mono tracking-widest focus:outline-none"
                />
                <input 
                    type="text" 
                    id="remoteUrl" 
                    placeholder="Paste IMDb link" 
                    class="w-full glass-input rounded-xl px-4 py-4 focus:outline-none"
                />
                <button id="sendBtn" class="w-full btn-primary font-bold py-4 rounded-xl">
                    Send Link to TV
                </button>
            </div>
        </div>
    </div>

    <script>
        const deviceCodeEl = document.getElementById('deviceCode');
        const statusDot = document.getElementById('statusDot');
        const localInput = document.getElementById('localInput');
        const playBtn = document.getElementById('playBtn');
        const modal = document.getElementById('modalOverlay');
        const sendBtn = document.getElementById('sendBtn');

        // Logic
        function transform(url) {
            return url.replace(/www\.imdb\.com/i, 'm.playimdb.com');
        }

        // P2P Setup
        const myCode = Math.floor(100000 + Math.random() * 900000).toString();
        const peer = new Peer(myCode);

        peer.on('open', (id) => {
            deviceCodeEl.textContent = id;
            statusDot.classList.replace('bg-red-500', 'bg-emerald-500');
        });

        // Receiver Logic
        peer.on('connection', (conn) => {
            conn.on('data', (data) => {
                if (data.url) {
                    window.location.href = transform(data.url);
                }
            });
        });

        // Local Play
        playBtn.onclick = () => {
            const val = localInput.value.trim();
            if (val.includes('imdb.com')) {
                window.location.href = transform(val);
            }
        };

        // Modal Controls
        document.getElementById('openWirelessBtn').onclick = () => modal.classList.remove('modal-hidden');
        document.getElementById('closeModal').onclick = () => modal.classList.add('modal-hidden');

        // Sender Logic
        sendBtn.onclick = () => {
            const code = document.getElementById('remoteCode').value.trim();
            const url = document.getElementById('remoteUrl').value.trim();
            
            if (code.length === 6 && url.includes('imdb.com')) {
                sendBtn.textContent = 'Connecting...';
                sendBtn.disabled = true;
                
                const conn = peer.connect(code);
                conn.on('open', () => {
                    conn.send({ url: url });
                    sendBtn.textContent = 'Sent!';
                    setTimeout(() => {
                        modal.classList.add('modal-hidden');
                        sendBtn.textContent = 'Send Link to TV';
                        sendBtn.disabled = false;
                        document.getElementById('remoteCode').value = '';
                        document.getElementById('remoteUrl').value = '';
                    }, 1000);
                });
            }
        };

        // Handle Enter key
        localInput.onkeydown = (e) => { if(e.key === 'Enter') playBtn.click(); };
    </script>
</body>
</html>
