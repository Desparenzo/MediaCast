<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Offline Compass Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; touch-action: manipulation; }
        
        .compass-area {

<body class="flex flex-col h-screen w-screen p-6 justify-between items-center">

    <!-- TOP: MY GENERATED CODE -->
    <div class="w-full max-w-sm flex flex-col items-center pt-4">
        <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-3">Your Location Code</p>
        <div class="w-full bg-gray-900/50 border border-gray-800 rounded-2xl p-4 flex items-center justify-between">

            <button id="copy-btn" class="bg-red-600 hover:bg-red-700 text-white p-3 rounded-xl transition-all active:scale-90">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/></svg>

        <input type="text" id="target-input" placeholder="PASTE HERE" 
               class="w-full bg-transparent border-b-2 border-gray-800 py-4 text-center text-2xl font-black text-white focus:outline-none focus:border-red-600 transition-all uppercase tracking-widest">
        
        <div class="mt-4 flex justify-between text-[10px] text-gray-600 font-mono">
            <span>ME: <span id="my-raw">--</span></span>
            <span>TGT: <span id="tgt-raw">--</span></span>
        </div>
    </div>

    <script>
        // --- DATA COMPRESSION (BASE 36) ---
        // Compresses global coords into 8-10 characters
        function encodeCoords(lat, lng) {
            // Normalize: Shift to all positive, multiply by 100,000 for precision
            const flat = Math.floor((lat + 90) * 100000);
            const flng = Math.floor((lng + 180) * 100000);
            return flat.toString(36).toUpperCase() + "X" + flng.toString(36).toUpperCase();
        }

        function decodeCoords(code) {
            try {
                const parts = code.toUpperCase().split('X');
                if (parts.length !== 2) return null;
                const lat = (parseInt(parts[0], 36) / 100000) - 90;
                const lng = (parseInt(parts[1], 36) / 100000) - 180;
                return isNaN(lat) || isNaN(lng) ? null : { lat, lng };
            } catch (e) { return null; }
        }

        // --- CORE STATE ---
        let myLoc = { lat: null, lng: null };
        let targetLoc = null;
        let phoneHeading = 0;
        let targetBearing = 0;

        const myCodeEl = document.getElementById('my-code');
        const targetInput = document.getElementById('target-input');
        const arrow = document.getElementById('arrow');
        const distVal = document.getElementById('dist-val');
        const distUnit = document.getElementById('dist-unit');
        const ring = document.getElementById('ring');

        // 1. Android Compass (Absolute Orientation)
        window.addEventListener('deviceorientationabsolute', (e) => {
            if (e.alpha !== null) {
                // Adjusting for common Android browser behavior
                phoneHeading = 360 - e.alpha; 
                updateArrow();
            }
        }, true);

        // 2. GPS Monitoring
        navigator.geolocation.watchPosition((pos) => {
            myLoc.lat = pos.coords.latitude;
            myLoc.lng = pos.coords.longitude;
            
            const code = encodeCoords(myLoc.lat, myLoc.lng);
            myCodeEl.innerText = code;
            document.getElementById('my-raw').innerText = `${myLoc.lat.toFixed(2)},${myLoc.lng.toFixed(2)}`;
            
            updateCalculations();
        }, (err) => {
            myCodeEl.innerText = "GPS ERROR";
            console.error(err);
        }, { enableHighAccuracy: true });

        // 3. Target Input Listening
        targetInput.addEventListener('input', (e) => {
            const code = e.target.value.trim().toUpperCase();
            const decoded = decodeCoords(code);
            if (decoded) {
                targetLoc = decoded;
                ring.classList.add('tracking-active');
                document.getElementById('tgt-raw').innerText = `${targetLoc.lat.toFixed(2)},${targetLoc.lng.toFixed(2)}`;
                updateCalculations();
            }
        });

        // 4. Calculations
        function updateCalculations() {
            if (!myLoc.lat || !targetLoc) return;

            // Distance (Haversine)
            const R = 6371000;
            const dLat = (targetLoc.lat - myLoc.lat) * Math.PI / 180;
            const dLon = (targetLoc.lng - myLoc.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + 
                      Math.cos(myLoc.lat * Math.PI/180) * Math.cos(targetLoc.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const d = R * c;

            if (d > 1000) {
                distVal.innerText = (d/1000).toFixed(1);
                distUnit.innerText = "Kilometers Away";
            } else {
                distVal.innerText = Math.round(d);
                distUnit.innerText = "Meters Away";
            }

            // Bearing (Angle from North)
            const y = Math.sin(dLon) * Math.cos(targetLoc.lat * Math.PI / 180);
            const x = Math.cos(myLoc.lat * Math.PI / 180) * Math.sin(targetLoc.lat * Math.PI / 180) -
                      Math.sin(myLoc.lat * Math.PI / 180) * Math.cos(targetLoc.lat * Math.PI / 180) * Math.cos(dLon);
            targetBearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            
            updateArrow();
        }

        function updateArrow() {
            // Visual rotation = Bearing to Target - Physical Heading of phone
            const finalRotation = targetBearing - phoneHeading;
            arrow.style.transform = `rotate(${finalRotation}deg)`;
        }

        // 5. Utility: Copy to Clipboard
        document.getElementById('copy-btn').onclick = () => {
            const code = myCodeEl.innerText;
            if (code === "LOADING..." || code === "GPS ERROR") return;
            
            // Clipboard API fallback for standard browser environments
            const temp = document.createElement("textarea");
            temp.value = code;
            document.body.appendChild(temp);
            temp.select();
            document.execCommand("copy");
            document.body.removeChild(temp);
            
            // UI feedback
            const btn = document.getElementById('copy-btn');
            const oldHtml = btn.innerHTML;
            btn.innerHTML = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`;
            setTimeout(() => { btn.innerHTML = oldHtml; }, 2000);
        };
    </script>
</body>
</html>
