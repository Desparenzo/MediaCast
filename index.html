<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Compass Only Panning</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; touch-action: none; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }
        .overlay-btn {
            pointer-events: auto; margin-top: 45vh; padding: 15px 35px;
            background: rgba(0, 50, 0, 0.3); border: 2px solid #0f0;
            color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
            box-shadow: 0 0 20px rgba(0,255,0,0.2);
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 12px;
            background: rgba(0,20,0,0.9); padding: 12px; border: 1px solid #0f0;
            border-radius: 4px; line-height: 1.5;
        }
    </style>
</head>
<body>

    <div id="ui">
        <button id="start-btn" class="overlay-btn">Enable Compass Access</button>
        <div id="hud">COMPASS: OFFLINE</div>
    </div>

    <script>
        let scene, camera, renderer;
        let heading = 0;
        const eyeHeight = 1.65;

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, eyeHeight, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            buildRoom();
            
            document.getElementById('start-btn').addEventListener('click', startCompass);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        function buildRoom() {
            const size = 20;
            const height = 8;

            // Grid Floor
            const grid = new THREE.GridHelper(size, 20, 0x00ff00, 0x002200);
            scene.add(grid);

            // Ceiling
            const ceil = grid.clone();
            ceil.position.y = height;
            scene.add(ceil);

            // Illuminated Border Lines
            const boxGeom = new THREE.BoxGeometry(size, height, size);
            const edges = new THREE.EdgesGeometry(boxGeom);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.8 });
            const room = new THREE.LineSegments(edges, lineMat);
            room.position.y = height / 2;
            scene.add(room);

            // Cardinal Direction Markers
            const createMarker = (x, z, col, label) => {
                const geo = new THREE.BoxGeometry(0.5, height, 0.1);
                const mat = new THREE.MeshBasicMaterial({ color: col, wireframe: true });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(x, height/2, z);
                if (x !== 0) mesh.rotation.y = Math.PI / 2;
                scene.add(mesh);
            };

            createMarker(0, -9.9, 0xff0000); // NORTH (Red)
            createMarker(9.9, 0, 0x00ff00);  // EAST (Green)
            createMarker(-9.9, 0, 0x0000ff); // WEST (Blue)
            createMarker(0, 9.9, 0xffffff);  // SOUTH (White)
        }

        async function startCompass() {
            // Standard Compass access for iOS/Android
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation, true);
                }
            } else {
                // For Android or browsers that don't require explicit permission
                window.addEventListener('deviceorientationabsolute', handleOrientation, true) || 
                window.addEventListener('deviceorientation', handleOrientation, true);
            }
            document.getElementById('start-btn').style.display = 'none';
        }

        function handleOrientation(event) {
            // Using webkitCompassHeading for iOS, alpha for Android absolute
            if (event.webkitCompassHeading) {
                // iOS: webkitCompassHeading is the degrees clockwise from North
                heading = event.webkitCompassHeading;
            } else if (event.absolute && event.alpha !== null) {
                // Android: Alpha is degrees counter-clockwise from North
                heading = 360 - event.alpha;
            } else {
                // Fallback (might not be North-aligned)
                heading = 360 - (event.alpha || 0);
            }

            document.getElementById('hud').innerHTML = `COMPASS HEADING: ${Math.round(heading)}°`;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // Map compass heading to camera rotation
            // We rotate around the Y axis (vertical axis)
            const rad = THREE.MathUtils.degToRad(-heading);
            camera.rotation.y = rad;

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
