<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Foundation Viewport</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: monospace; }
        canvas { display: block; }
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }
        .hud-ui {
            position: absolute;
            bottom: 20px;
            color: #00ff00;
            text-align: center;
            font-size: 12px;
            background: rgba(0, 40, 0, 0.5);
            padding: 10px;
            border: 1px solid #00ff00;
            pointer-events: auto;
        }
        #crosshair {
            width: 10px;
            height: 10px;
            border: 1px solid #00ff00;
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <div id="crosshair"></div>
        <div id="init-btn" class="hud-ui cursor-pointer">
            CALIBRATE SENSORS & START
        </div>
        <div id="debug" style="position: absolute; top: 10px; left: 10px; color: #00ff00; font-size: 10px;">
            SENSORS: STANDBY
        </div>
    </div>

    <script>
        let scene, camera, renderer;
        let sensorAlpha = 0, sensorBeta = 0, sensorGamma = 0;
        const playerHeight = 1.6; // Eyes at 1.6 meters

        function init() {
            // 1. Scene Setup
            scene = new THREE.Scene();

            // 2. Camera Setup
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            // Position camera in the center of the room at eye level
            camera.position.set(0, playerHeight, 0);
            // Important: Set rotation order to YXZ for natural head movement
            camera.rotation.order = 'YXZ';

            // 3. Renderer Setup
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            createRoom();

            window.addEventListener('resize', onWindowResize);
            document.getElementById('init-btn').addEventListener('click', startSensors);

            animate();
        }

        function createRoom() {
            const size = 10;
            const height = 4;

            // Create a simple wireframe box for the room
            const geometry = new THREE.BoxGeometry(size, height, size);
            const edges = new THREE.EdgesGeometry(geometry);
            const material = new THREE.LineBasicMaterial({ color: 0x00ff00 });
            const room = new THREE.LineSegments(edges, material);
            
            // Move room so floor is at y=0
            room.position.y = height / 2;
            scene.add(room);

            // Add a floor grid
            const gridHelper = new THREE.GridHelper(size, 10, 0x00ff00, 0x004400);
            scene.add(gridHelper);

            // Add a reference object in front of the user (at -Z)
            const boxGeom = new THREE.BoxGeometry(0.5, 0.5, 0.5);
            const boxMat = new THREE.MeshBasicMaterial({ color: 0x00ff00, wireframe: true });
            const refBox = new THREE.Mesh(boxGeom, boxMat);
            refBox.position.set(0, playerHeight, -4); // 4 meters in front
            scene.add(refBox);
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', updateOrientation);
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                window.addEventListener('deviceorientation', updateOrientation);
            }
            document.getElementById('init-btn').style.display = 'none';
        }

        function updateOrientation(event) {
            sensorAlpha = event.alpha || 0; // Yaw
            sensorBeta = event.beta || 0;   // Pitch
            sensorGamma = event.gamma || 0; // Roll
            
            document.getElementById('debug').innerText = 
                `YAW: ${Math.round(sensorAlpha)} | PITCH: ${Math.round(sensorBeta)} | ROLL: ${Math.round(sensorGamma)}`;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // CALIBRATION LOGIC
            // When holding the phone upright (portrait):
            // Beta (X-axis) is 90 when vertical. We subtract 90 to look level at 0.
            const pitch = THREE.MathUtils.degToRad(sensorBeta - 90); 
            const yaw = THREE.MathUtils.degToRad(-sensorAlpha);
            const roll = THREE.MathUtils.degToRad(-sensorGamma);

            // Apply rotation in YXZ order (Yaw -> Pitch -> Roll)
            camera.rotation.set(pitch, yaw, roll);

            renderer.render(scene, camera);
        }

        window.onload = init;
    </script>
</body>
</html>
