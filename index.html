```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Raw Sensor Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #000; 
            color: #0f0; 
            font-family: 'Courier New', monospace; 
            touch-action: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        .data-card {
            border: 1px solid #0f0;
            background: rgba(0, 20, 0, 0.5);
            padding: 20px;
            margin: 10px;
            border-radius: 8px;
        }
        .val {
            font-size: 3rem;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 10px #0f0;
        }
        .label {
            font-size: 0.8rem;
            color: #0f0;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="flex-1 flex flex-col justify-center p-4">
        <div class="data-card">
            <div class="label">Alpha (Z-Axis / Compass)</div>
            <div id="alpha" class="val">0.00</div>
        </div>

        <div class="data-card">
            <div class="label">Beta (X-Axis / Pitch)</div>
            <div id="beta" class="val">0.00</div>
        </div>

        <div class="data-card">
            <div class="label">Gamma (Y-Axis / Roll)</div>
            <div id="gamma" class="val">0.00</div>
        </div>
    </div>

    <div class="p-6 text-center">
        <button id="start" class="bg-green-900 border-2 border-green-400 text-green-400 px-8 py-4 rounded-full font-bold uppercase tracking-widest active:bg-green-400 active:text-black">
            Initialize Sensors
        </button>
    </div>

    <script>
        const alphaEl = document.getElementById('alpha');
        const betaEl = document.getElementById('beta');
        const gammaEl = document.getElementById('gamma');
        const startBtn = document.getElementById('start');

        async function start() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', update);
                        startBtn.style.display = 'none';
                    }
                } catch (err) {
                    console.error(err);
                }
            } else {
                window.addEventListener('deviceorientation', update);
                startBtn.style.display = 'none';
            }
        }

        function update(e) {
            // Using toFixed(2) for high precision data gathering
            alphaEl.innerText = (e.alpha || 0).toFixed(2);
            betaEl.innerText = (e.beta || 0).toFixed(2);
            gammaEl.innerText = (e.gamma || 0).toFixed(2);
        }

        startBtn.addEventListener('click', start);
    </script>
</body>
</html>
