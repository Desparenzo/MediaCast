```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gyro Phone Tracker</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #111; font-family: sans-serif; }
        canvas { display: block; }
        .ui-overlay {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            color: white;
            pointer-events: none;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            display: flex;
            gap: 10px;
        }
        button {
            pointer-events: auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        button:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        #status {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 5px;
        }
        .modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            text-align: center;
            padding: 20px;
        }
    </style>
</head>
<body>

    <div id="permissionModal" class="modal">
        <div class="bg-zinc-900 p-8 rounded-2xl border border-zinc-700 max-w-sm">
            <h2 class="text-xl font-bold text-white mb-4">Gyroscope Access</h2>
            <p class="text-zinc-400 mb-6">This app needs access to your device's orientation sensors to visualize the phone in 3D.</p>
            <button onclick="requestPermission()" class="w-full !bg-blue-600 !border-none">Start Tracking</button>
        </div>
    </div>

    <div class="ui-overlay">
        <h1 class="text-2xl font-black">GYRO PRO</h1>
        <div id="status">Waiting for sensor data...</div>
        <div id="data-readout" class="mt-4 font-mono text-xs space-y-1">
            <div>ALPHA: <span id="val-a">0</span>°</div>
            <div>BETA: <span id="val-b">0</span>°</div>
            <div>GAMMA: <span id="val-g">0</span>°</div>
        </div>
    </div>

    <div class="controls">
        <button onclick="calibrate()">Calibrate (Lay Flat)</button>
    </div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let offset = { alpha: 0, beta: 0, gamma: 0 };
        let currentOrientation = { alpha: 0, beta: 0, gamma: 0 };
        let isCalibrated = false;

        function init() {
            // Scene setup
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 5;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
            scene.add(ambientLight);

            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(5, 5, 5);
            scene.add(directionalLight);

            const pointLight = new THREE.PointLight(0x3b82f6, 1);
            pointLight.position.set(-5, -2, 2);
            scene.add(pointLight);

            // Phone Mesh Construction
            phoneGroup = new THREE.Group();

            // Main Body (Rounded Rect)
            const geometry = new THREE.BoxGeometry(2, 4, 0.2);
            const bodyMaterial = new THREE.MeshPhongMaterial({ 
                color: 0x111111, 
                shininess: 100,
                specular: 0x444444
            });
            const phoneBody = new THREE.Mesh(geometry, bodyMaterial);
            phoneGroup.add(phoneBody);

            // Screen
            const screenGeom = new THREE.PlaneGeometry(1.85, 3.75);
            const screenMat = new THREE.MeshPhongMaterial({ 
                color: 0x000000, 
                emissive: 0x050505,
                shininess: 150 
            });
            const screen = new THREE.Mesh(screenGeom, screenMat);
            screen.position.z = 0.101;
            phoneGroup.add(screen);

            // "Camera" on back
            const camGeom = new THREE.CircleGeometry(0.15, 32);
            const camMat = new THREE.MeshPhongMaterial({ color: 0x222222 });
            const cameraLens = new THREE.Mesh(camGeom, camMat);
            cameraLens.position.set(0.6, 1.6, -0.101);
            cameraLens.rotation.y = Math.PI;
            phoneGroup.add(cameraLens);

            // Bezels / Details
            const speakerGeom = new THREE.CapsuleGeometry(0.02, 0.3, 4, 8);
            const speaker = new THREE.Mesh(speakerGeom, camMat);
            speaker.rotation.z = Math.PI / 2;
            speaker.position.set(0, 1.85, 0.101);
            phoneGroup.add(speaker);

            scene.add(phoneGroup);

            // Grid helper
            const grid = new THREE.GridHelper(20, 20, 0x444444, 0x222222);
            grid.rotation.x = Math.PI / 2;
            grid.position.z = -2;
            scene.add(grid);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            if (phoneGroup) {
                // DeviceOrientation returns degrees
                // Alpha: rotation around Z (0 to 360)
                // Beta: rotation around X (-180 to 180)
                // Gamma: rotation around Y (-90 to 90)
                
                let a = (currentOrientation.alpha - offset.alpha) * (Math.PI / 180);
                let b = (currentOrientation.beta - offset.beta) * (Math.PI / 180);
                let g = (currentOrientation.gamma - offset.gamma) * (Math.PI / 180);

                // Use Euler order ZXY or YXZ depending on desired mapping
                // For a phone lying flat: 
                // X (beta) is tilt forward/back
                // Y (gamma) is tilt left/right
                // Z (alpha) is compass heading
                
                phoneGroup.rotation.set(b, g, -a, 'YXZ');
            }

            renderer.render(scene, camera);
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        startTracking();
                    } else {
                        updateStatus("Permission denied.");
                    }
                } catch (err) {
                    console.error(err);
                    updateStatus("Error requesting permission.");
                }
            } else {
                // Non-iOS or older browser
                startTracking();
            }
        }

        function startTracking() {
            document.getElementById('permissionModal').style.display = 'none';
            window.addEventListener('deviceorientation', (event) => {
                currentOrientation.alpha = event.alpha || 0;
                currentOrientation.beta = event.beta || 0;
                currentOrientation.gamma = event.gamma || 0;

                document.getElementById('val-a').innerText = currentOrientation.alpha.toFixed(1);
                document.getElementById('val-b').innerText = currentOrientation.beta.toFixed(1);
                document.getElementById('val-g').innerText = currentOrientation.gamma.toFixed(1);
                
                updateStatus("Tracking Active");
            });
        }

        function calibrate() {
            // Set current orientation as the zero point
            offset.alpha = currentOrientation.alpha;
            offset.beta = currentOrientation.beta;
            offset.gamma = currentOrientation.gamma;
            
            updateStatus("Calibrated to Flat!");
            
            // Visual feedback
            const btn = event.target;
            const originalText = btn.innerText;
            btn.innerText = "✓ CALIBRATED";
            btn.style.background = "#059669";
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = "";
            }, 1500);
        }

        function updateStatus(msg) {
            document.getElementById('status').innerText = msg;
        }

        window.onload = init;
    </script>
</body>
</html>
