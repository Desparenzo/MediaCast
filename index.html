    <script>
        let myLat = null;
        let myLong = null;
        let targetLat = null;
        let targetLong = null;
        let deviceHeading = 0;

        const myCoordsDisplay = document.getElementById('my-coords');
        const copyBtn = document.getElementById('copy-btn');
        const copyToast = document.getElementById('copy-toast');
        const findInput = document.getElementById('find-input');
        const findBtn = document.getElementById('find-btn');
        const navDisplay = document.getElementById('nav-display');
        const idleMsg = document.getElementById('idle-msg');
        const distanceText = document.getElementById('distance-text');
        const arrowContainer = document.getElementById('arrow-container');

        // 1. Get My Location
        function updateMyLocation() {
            if (!navigator.geolocation) {
                myCoordsDisplay.textContent = "GPS Not Supported";
                return;
            }

            navigator.geolocation.watchPosition(
                (position) => {
                    myLat = position.coords.latitude;
                    myLong = position.coords.longitude;
                    myCoordsDisplay.textContent = `${myLat.toFixed(5)}, ${myLong.toFixed(5)}`;
                    
                    if (targetLat !== null) {
                        calculateNavigation();
                    }
                },
                (err) => {
                    myCoordsDisplay.textContent = "Error: " + err.message;
                },
                { enableHighAccuracy: true }
            );
        }

        // 2. Copy to Clipboard
        copyBtn.addEventListener('click', () => {
            if (myLat === null || myLong === null) {
                alert("Wait for GPS signal before copying.");
                return;
            }

            const code = `${myLat}_${myLong}`;
            
            // Fallback for iFrame/Security restrictions
            const textArea = document.createElement("textarea");
            textArea.value = code;
            document.body.appendChild(textArea);
            textArea.select();
            try {
                document.execCommand('copy');
                copyToast.style.opacity = "1";
                setTimeout(() => copyToast.style.opacity = "0", 2000);
            } catch (err) {
                console.error("Copy failed", err);
            }
            document.body.removeChild(textArea);
        });

        // 3. Find/Parse Target
        findBtn.addEventListener('click', () => {
            const val = findInput.value.trim();
            if (!val.includes('_')) {
                alert("Invalid format. Ensure it looks like: lat_long");
                return;
            }

            const parts = val.split('_');
            const lat = parseFloat(parts[0]);
            const lng = parseFloat(parts[1]);

            if (isNaN(lat) || isNaN(lng)) {
                alert("Could not read coordinates.");
                return;
            }

            targetLat = lat;
            targetLong = lng;

            navDisplay.classList.remove('hidden');
            idleMsg.classList.add('hidden');
            
            // Request orientation permission for iOS
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(state => {
                        if (state === 'granted') {
                            startCompass();
                        }
                    });
            } else {
                startCompass();
            }

            calculateNavigation();
        });

        // 4. Compass/Orientation Logic
        function startCompass() {
            window.addEventListener('deviceorientationabsolute', handleOrientation, true);
            // Fallback for browsers that don't support absolute
            window.addEventListener('deviceorientation', handleOrientation, true);
        }

        function handleOrientation(event) {
            // webkitCompassHeading is iOS specific, alpha is standard
            let heading = event.webkitCompassHeading || (360 - event.alpha);
            if (heading) {
                deviceHeading = heading;
                if (targetLat !== null) calculateNavigation();
            }
        }

        // 5. Harvesine Formula for distance and Bearing for Arrow
        function calculateNavigation() {
            if (myLat === null || targetLat === null) return;

            const R = 6371; // Earth radius in km
            const dLat = (targetLat - myLat) * Math.PI / 180;
            const dLon = (targetLong - myLong) * Math.PI / 180;
            const a = 
                Math.sin(dLat/2) * Math.sin(dLat/2) +
                Math.cos(myLat * Math.PI / 180) * Math.cos(targetLat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const distance = R * c;

            // Update distance display
            if (distance < 1) {
                distanceText.textContent = `${(distance * 1000).toFixed(0)} m`;
            } else {
                distanceText.textContent = `${distance.toFixed(2)} km`;
            }

            // Calculate Bearing
            const y = Math.sin(dLon) * Math.cos(targetLat * Math.PI / 180);
            const x = Math.cos(myLat * Math.PI / 180) * Math.sin(targetLat * Math.PI / 180) -
                      Math.sin(myLat * Math.PI / 180) * Math.cos(targetLat * Math.PI / 180) * Math.cos(dLon);
            let bearing = Math.atan2(y, x) * 180 / Math.PI;
            
            // Normalize bearing and subtract device heading to point arrow
            let arrowRotation = (bearing - deviceHeading + 360) % 360;
            arrowContainer.style.transform = `rotate(${arrowRotation}deg)`;
        }

        // Initialize
        window.onload = updateMyLocation;

    </script>
</body>
