<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GPS Path Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f3f4f6;
            touch-action: manipulation;
        }
        #map-container {
            aspect-ratio: 1 / 1;
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .dot {
            transition: all 0.3s ease-out;
        }
    </style>
</head>
<body class="p-4 max-w-lg mx-auto font-sans">

    <h1 class="text-2xl font-bold mb-4 text-gray-800">Path Finder</h1>

    <!-- Start Location Box -->
    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-200">
        <label class="block text-sm font-medium text-gray-600 mb-1">Start Location (Lat, Long)</label>
        <div class="flex gap-2">
            <input type="text" id="start-coords" placeholder="0.00, 0.00" 
                class="flex-1 p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="setCurrentTo('start')" class="bg-gray-100 p-2 rounded-lg hover:bg-gray-200" title="Use GPS">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
            </button>
        </div>
    </div>

    <!-- Target Location Box -->
    <div class="bg-white p-4 rounded-xl shadow-sm mb-4 border border-gray-200">
        <label class="block text-sm font-medium text-gray-600 mb-1">Target Destination (Lat, Long)</label>
        <div class="flex gap-2">
            <input type="text" id="target-coords" placeholder="0.00, 0.00" 
                class="flex-1 p-2 border rounded-lg text-sm focus:ring-2 focus:ring-blue-500 outline-none">
            <button onclick="updatePoints()" class="bg-blue-600 text-white px-4 py-2 rounded-lg font-semibold hover:bg-blue-700 transition">
                Find
            </button>
        </div>
    </div>

    <!-- Map Area -->
    <div id="map-container" class="relative bg-white border-2 border-gray-300 rounded-2xl overflow-hidden shadow-inner mb-4">
        <!-- Connecting Line -->
        <svg id="svg-layer" class="absolute inset-0 w-full h-full pointer-events-none">
            <line id="path-line" x1="0" y1="0" x2="0" y2="0" stroke="#94a3b8" stroke-width="2" stroke-dasharray="5,5" />
        </svg>

        <!-- Points -->
        <div id="point-start" class="dot absolute w-4 h-4 bg-gray-400 rounded-full border-2 border-white shadow-md transform -translate-x-1/2 -translate-y-1/2 hidden"></div>
        <div id="point-target" class="dot absolute w-5 h-5 bg-red-500 rounded-full border-2 border-white shadow-md transform -translate-x-1/2 -translate-y-1/2 hidden">
             <div class="animate-ping absolute inset-0 rounded-full bg-red-400 opacity-75"></div>
        </div>
        <div id="point-current" class="dot absolute w-6 h-6 bg-blue-600 rounded-full border-2 border-white shadow-lg transform -translate-x-1/2 -translate-y-1/2 z-10 hidden">
            <div class="w-full h-full rounded-full border-2 border-blue-200 animate-pulse"></div>
        </div>
    </div>

    <!-- Status Bar -->
    <div class="grid grid-cols-2 gap-4 text-xs font-mono bg-gray-800 text-green-400 p-3 rounded-lg">
        <div>MY GPS: <span id="status-gps">WAITING...</span></div>
        <div class="text-right">DIST: <span id="status-dist">0.0km</span></div>
    </div>

    <script>
        let watchId = null;
        let points = {
            start: null,
            target: null,
            current: null
        };

        // Initialize GPS tracking
        function initTracking() {
            if ("geolocation" in navigator) {
                watchId = navigator.geolocation.watchPosition(
                    (pos) => {
                        const lat = pos.coords.latitude;
                        const lng = pos.coords.longitude;
                        points.current = { lat, lng };
                        document.getElementById('status-gps').innerText = `${lat.toFixed(4)}, ${lng.toFixed(4)}`;
                        render();
                    },
                    (err) => {
                        console.error("GPS Error:", err);
                        showToast("Please enable Location Services");
                    },
                    { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
                );
            } else {
                showToast("Geolocation not supported");
            }
        }

        async function setCurrentTo(id) {
            navigator.geolocation.getCurrentPosition((pos) => {
                const val = `${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
                document.getElementById(`${id}-coords`).value = val;
                updatePoints();
            });
        }

        function parseCoords(id) {
            const val = document.getElementById(`${id}-coords`).value;
            if (!val) return null;
            const parts = val.split(',').map(p => parseFloat(p.trim()));
            if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
                return { lat: parts[0], lng: parts[1] };
            }
            return null;
        }

        function updatePoints() {
            points.start = parseCoords('start');
            points.target = parseCoords('target');
            render();
        }

        function calculateDistance(p1, p2) {
            if (!p1 || !p2) return 0;
            const R = 6371; // km
            const dLat = (p2.lat - p1.lat) * Math.PI / 180;
            const dLon = (p2.lng - p1.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(p1.lat * Math.PI / 180) * Math.cos(p2.lat * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function render() {
            const container = document.getElementById('map-container');
            const w = container.clientWidth;
            const h = container.clientHeight;
            const padding = 40; // Pixels from edge

            // Collect all active points
            const activePoints = [];
            if (points.start) activePoints.push(points.start);
            if (points.target) activePoints.push(points.target);
            if (points.current) activePoints.push(points.current);

            if (activePoints.length === 0) return;

            // Find bounds
            let minLat = Math.min(...activePoints.map(p => p.lat));
            let maxLat = Math.max(...activePoints.map(p => p.lat));
            let minLng = Math.min(...activePoints.map(p => p.lng));
            let maxLng = Math.max(...activePoints.map(p => p.lng));

            // Add slight buffer if points are identical
            if (minLat === maxLat) { minLat -= 0.001; maxLat += 0.001; }
            if (minLng === maxLng) { minLng -= 0.001; maxLng += 0.001; }

            // Scaling functions
            const getX = (lng) => padding + ((lng - minLng) / (maxLng - minLng)) * (w - 2 * padding);
            const getY = (lat) => h - (padding + ((lat - minLat) / (maxLat - minLat)) * (h - 2 * padding));

            // Update UI Dots
            const updateDot = (elId, point) => {
                const el = document.getElementById(elId);
                if (point) {
                    el.classList.remove('hidden');
                    el.style.left = getX(point.lng) + 'px';
                    el.style.top = getY(point.lat) + 'px';
                } else {
                    el.classList.add('hidden');
                }
            };

            updateDot('point-start', points.start);
            updateDot('point-target', points.target);
            updateDot('point-current', points.current);

            // Update Line
            const line = document.getElementById('path-line');
            if (points.start && points.target) {
                line.setAttribute('x1', getX(points.start.lng));
                line.setAttribute('y1', getY(points.start.lat));
                line.setAttribute('x2', getX(points.target.lng));
                line.setAttribute('y2', getY(points.target.lat));
                line.style.opacity = 1;
            } else {
                line.style.opacity = 0;
            }

            // Update Distance
            if (points.current && points.target) {
                const dist = calculateDistance(points.current, points.target);
                document.getElementById('status-dist').innerText = dist > 1 ? dist.toFixed(2) + 'km' : (dist * 1000).toFixed(0) + 'm';
            }
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = "fixed bottom-20 left-1/2 -translate-x-1/2 bg-red-600 text-white px-4 py-2 rounded-full text-sm shadow-lg z-50";
            toast.innerText = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // Start everything
        window.onload = () => {
            initTracking();
            // Handle window resizing
            window.addEventListener('resize', render);
        };
    </script>
</body>
</html>
