    <title>Direct GPS Compass</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        .compass-ring {
            width: 280px;
            height: 280px;
            border: 2px solid #1a1a1a;
            border-radius: 50%;

            align-items: center;
            position: relative;
            background: radial-gradient(circle, #0a0a0a 0%, #000 100%);
        }
        #arrow {
            width: 110px;
            height: 110px;
            fill: #ff3b30;
            filter: drop-shadow(0 0 15px rgba(255, 59, 48, 0.6));
            transition: transform 0.1s linear;
        }
        .distance-display { font-variant-numeric: tabular-nums; }

</head>
<body class="flex flex-col h-screen w-screen p-6 items-center justify-between">

    <!-- TOP SECTION: SHARING -->
    <div class="w-full max-w-sm text-center pt-4">
        <p class="text-[10px] text-gray-500 uppercase tracking-[0.2em] mb-4">My Location Status</p>
        <div id="gps-status" class="text-xs text-yellow-500 mb-4 font-mono">Waiting for GPS...</div>
        
        <button id="share-btn" class="w-full bg-white text-black font-bold py-4 rounded-2xl flex items-center justify-center space-x-2 active:scale-95 transition-transform">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
            <span>SEND MY LOCATION</span>
        </button>
    </div>

    <!-- MIDDLE SECTION: COMPASS -->
    <div class="flex flex-col items-center">
        <div class="compass-ring">
            <svg id="arrow" viewBox="0 0 100 100">
                <path d="M50 2 L95 90 L50 75 L5 90 Z" />
            </svg>
            
            <div class="absolute -bottom-14 flex flex-col items-center">
                <div id="dist-val" class="text-5xl font-black distance-display">--</div>
                <div id="dist-unit" class="text-[10px] text-gray-500 uppercase tracking-widest mt-1">Ready for input</div>
            </div>
        </div>
    </div>

    <!-- BOTTOM SECTION: RECEIVING -->
    <div class="w-full max-w-sm pb-10">
        <button id="locate-btn" class="w-full bg-red-600 hover:bg-red-700 text-white font-bold py-5 rounded-2xl flex flex-col items-center justify-center shadow-lg active:scale-95 transition-transform">
            <span class="text-lg">LOCATE TARGET</span>
            <span class="text-[10px] opacity-70 font-normal uppercase mt-1">Paste from Clipboard</span>
        </button>
        
        <div class="mt-6 flex justify-between text-[9px] font-mono text-gray-600 uppercase">
            <div>MY: <span id="my-raw">---</span></div>
            <div>TGT: <span id="tgt-raw">---</span></div>
        </div>
    </div>

    <script>
        let myLoc = { lat: null, lng: null };
        let targetLoc = null;
        let phoneHeading = 0;
        let targetBearing = 0;

        // --- GPS SENSORS ---
        const options = { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 };

        navigator.geolocation.watchPosition((pos) => {
            myLoc.lat = pos.coords.latitude;
            myLoc.lng = pos.coords.longitude;
            
            const accuracy = Math.round(pos.coords.accuracy);
            document.getElementById('gps-status').innerText = `GPS ACTIVE (ACCURACY: ${accuracy}m)`;
            document.getElementById('gps-status').classList.replace('text-yellow-500', 'text-green-500');
            document.getElementById('my-raw').innerText = `${myLoc.lat.toFixed(4)},${myLoc.lng.toFixed(4)}`;
            
            updateLogic();
        }, (err) => {
            document.getElementById('gps-status').innerText = "GPS ERROR: ENABLE LOCATION";
            document.getElementById('gps-status').classList.replace('text-yellow-500', 'text-red-500');
        }, options);

        // --- COMPASS SENSOR ---
        window.addEventListener('deviceorientationabsolute', (e) => {
            if (e.alpha !== null) {
                phoneHeading = 360 - e.alpha;
                renderArrow();
            }
        }, true);

        // --- BUTTON ACTIONS ---
        
        // SHARE
        document.getElementById('share-btn').onclick = async () => {
            if (!myLoc.lat) return;
            const text = `LOC:${myLoc.lat},${myLoc.lng}`;
            
            if (navigator.share) {
                try {
                    await navigator.share({ title: 'My Location', text: text });
                } catch (err) { console.log("Share cancelled"); }
            } else {
                // Fallback: Copy to clipboard if sharing API is unavailable
                const el = document.createElement('textarea');
                el.value = text;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                alert("Location text copied to clipboard! Paste it in WhatsApp.");
            }
        };

        // LOCATE (Clipboard Paste)
        document.getElementById('locate-btn').onclick = async () => {
            try {
                // Since navigator.clipboard might be blocked in some webviews, 
                // we'll try it, but also provide an input fallback if it fails.
                const text = await navigator.clipboard.readText();
                processIncomingText(text);
            } catch (err) {
                const manual = prompt("Paste the location string here (e.g. LOC:22.5,88.3):");
                if (manual) processIncomingText(manual);
            }
        };

        function processIncomingText(text) {
            const match = text.match(/LOC:(-?\d+\.\d+),(-?\d+\.\d+)/);
            if (match) {
                targetLoc = { lat: parseFloat(match[1]), lng: parseFloat(match[2]) };
                document.getElementById('tgt-raw').innerText = `${targetLoc.lat.toFixed(4)},${targetLoc.lng.toFixed(4)}`;
                document.getElementById('dist-unit').innerText = "Target Locked";
                updateLogic();
            } else {
                alert("Invalid code in clipboard. Make sure you copied the whole message.");
            }
        }

        // --- MATH ---
        function updateLogic() {
            if (!myLoc.lat || !targetLoc) return;

            // Haversine Distance
            const R = 6371000;
            const dLat = (targetLoc.lat - myLoc.lat) * Math.PI / 180;
            const dLon = (targetLoc.lng - myLoc.lng) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + 
                      Math.cos(myLoc.lat * Math.PI/180) * Math.cos(targetLoc.lat * Math.PI/180) * Math.sin(dLon/2)**2;
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            const d = R * c;

            const val = d > 1000 ? (d/1000).toFixed(2) : Math.round(d);
            const unit = d > 1000 ? "Kilometers" : "Meters";
            
            document.getElementById('dist-val').innerText = val;
            document.getElementById('dist-unit').innerText = unit + " Away";

            // Bearing
            const y = Math.sin(dLon) * Math.cos(targetLoc.lat * Math.PI / 180);
            const x = Math.cos(myLoc.lat * Math.PI / 180) * Math.sin(targetLoc.lat * Math.PI / 180) -
                      Math.sin(myLoc.lat * Math.PI / 180) * Math.cos(targetLoc.lat * Math.PI / 180) * Math.cos(dLon);
            targetBearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            
            renderArrow();
        }

        function renderArrow() {
            const finalRotation = targetBearing - phoneHeading;
            document.getElementById('arrow').style.transform = `rotate(${finalRotation}deg)`;
        }
    </script>
</body>
</html>
