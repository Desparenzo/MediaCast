```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manual Alignment Diagnostic</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: system-ui, sans-serif; color: white; }
        .glass { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); }
        input[type=range] { width: 100%; accent-color: #3b82f6; }
        .mono { font-family: ui-monospace, monospace; }
    </style>
</head>
<body>

    <div class="fixed top-0 left-0 w-full p-4 z-20 pointer-events-none">
        <div class="flex justify-between items-center pointer-events-auto">
            <h1 class="text-xl font-black text-blue-500 uppercase tracking-tighter">Alignment Sync</h1>
            <button id="startBtn" class="bg-blue-600 px-4 py-2 rounded-full text-xs font-bold">START SENSORS</button>
        </div>
    </div>

    <!-- Manual Adjustment Panel -->
    <div id="controls" class="fixed bottom-0 left-0 w-full p-6 z-30 glass rounded-t-3xl border-t border-white/10 hidden">
        <div class="max-w-md mx-auto space-y-4">
            <div class="text-center mb-2">
                <p class="text-sm font-bold text-blue-400">STEP: Match the 3D phone to your physical phone</p>
                <p class="text-[10px] text-slate-400 uppercase tracking-widest">Adjust sliders until they look identical</p>
            </div>
            
            <div class="space-y-3">
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>PITCH (Tilt Up/Down)</span><span id="pLabel">0°</span></div>
                    <input type="range" id="pitchSlider" min="-180" max="180" value="0">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>ROLL (Tilt Left/Right)</span><span id="rLabel">0°</span></div>
                    <input type="range" id="rollSlider" min="-180" max="180" value="0">
                </div>
                <div>
                    <div class="flex justify-between text-[10px] mb-1"><span>YAW (Compass Spin)</span><span id="yLabel">0°</span></div>
                    <input type="range" id="yawSlider" min="-180" max="180" value="0">
                </div>
            </div>

            <button id="captureBtn" class="w-full bg-blue-600 py-3 rounded-xl font-bold uppercase shadow-lg shadow-blue-900/20 mt-4">Capture Match #<span id="count">1</span></button>
            <button id="finishBtn" class="w-full bg-slate-800 text-slate-400 py-2 rounded-xl text-xs font-bold uppercase border border-white/5">Finish & Generate Export</button>
        </div>
    </div>

    <div id="canvas-container" class="fixed inset-0 z-10"></div>

    <!-- Result Modal -->
    <div id="resultModal" class="fixed inset-0 z-50 glass flex items-center justify-center p-6 hidden">
        <div class="bg-slate-900 w-full max-w-lg rounded-3xl p-6 border border-blue-500/30">
            <h2 class="text-xl font-bold text-blue-400 mb-2">Final Map Data</h2>
            <textarea id="output" class="w-full h-64 bg-black/50 p-4 rounded-xl font-mono text-[10px] text-emerald-400 border border-white/10 mb-4" readonly></textarea>
            <button id="copyBtn" class="w-full bg-white text-black py-3 rounded-xl font-bold uppercase">Copy for Developer</button>
        </div>
    </div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let sensorData = { a: 0, b: 0, g: 0 };
        let logs = [];

        function createPhone() {
            const group = new THREE.Group();
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 4.8, 0.25),
                new THREE.MeshStandardMaterial({ color: 0x1e293b })
            );
            group.add(body);
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.25, 4.65),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x3b82f6, emissiveIntensity: 0.2 })
            );
            screen.position.z = 0.13;
            group.add(screen);
            
            const canvas = document.createElement('canvas');
            canvas.width = 256; canvas.height = 512;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#3b82f6"; ctx.font = "bold 30px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("FRONT", 128, 256);
            ctx.fillText("▲ TOP ▲", 128, 60);
            const tex = new THREE.CanvasTexture(canvas);
            const overlay = new THREE.Mesh(new THREE.PlaneGeometry(2.25, 4.65), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
            overlay.position.z = 0.131;
            group.add(overlay);

            return group;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            phoneGroup = createPhone();
            scene.add(phoneGroup);
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            camera.position.set(0, 0, 10);

            function animate() {
                requestAnimationFrame(animate);
                renderer.render(scene, camera);
            }
            animate();
        }

        function updateManualRotation() {
            const p = document.getElementById('pitchSlider').value;
            const r = document.getElementById('rollSlider').value;
            const y = document.getElementById('yawSlider').value;
            
            document.getElementById('pLabel').innerText = p + '°';
            document.getElementById('rLabel').innerText = r + '°';
            document.getElementById('yLabel').innerText = y + '°';

            const rad = Math.PI / 180;
            // Apply simple YXZ to the phone based on sliders
            phoneGroup.rotation.set(p * rad, y * rad, r * rad, 'YXZ');
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }
            window.addEventListener('deviceorientation', (e) => {
                sensorData = { a: e.alpha || 0, b: e.beta || 0, g: e.gamma || 0 };
            });
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('controls').classList.remove('hidden');
        }

        window.onload = () => {
            init3D();
            document.getElementById('startBtn').onclick = startSensors;
            
            ['pitchSlider', 'rollSlider', 'yawSlider'].forEach(id => {
                document.getElementById(id).oninput = updateManualRotation;
            });

            document.getElementById('captureBtn').onclick = () => {
                logs.push({
                    physicalSensor: { ...sensorData },
                    manualAlignment: {
                        pitch: document.getElementById('pitchSlider').value,
                        roll: document.getElementById('rollSlider').value,
                        yaw: document.getElementById('yawSlider').value
                    }
                });
                document.getElementById('count').innerText = logs.length + 1;
            };

            document.getElementById('finishBtn').onclick = () => {
                document.getElementById('resultModal').classList.remove('hidden');
                document.getElementById('output').value = JSON.stringify(logs, null, 2);
            };

            document.getElementById('copyBtn').onclick = () => {
                const out = document.getElementById('output');
                out.select();
                document.execCommand('copy');
                document.getElementById('copyBtn').innerText = "COPIED!";
            };
        };
    </script>
</body>
</html>
