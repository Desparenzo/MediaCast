<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precision Calibrated V-Phone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #0f172a; font-family: system-ui, sans-serif; }
        .hud-glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.1); }
        .mono { font-family: ui-monospace, monospace; }
        #crosshair { width: 20px; height: 20px; border: 2px solid rgba(59, 130, 246, 0.5); border-radius: 50%; }
    </style>
</head>
<body class="text-white select-none">

    <!-- HUD Overlay -->
    <div class="fixed inset-0 pointer-events-none z-20 flex flex-col justify-between p-6">
        <div class="flex justify-between items-start">
            <div>
                <h1 class="text-3xl font-black italic tracking-tighter text-blue-500 uppercase leading-none">V-PHONE</h1>
                <p class="text-[10px] font-bold text-slate-400 tracking-[0.4em] uppercase mt-1">Calibrated System v1.0</p>
            </div>
            <div id="statusBadge" class="bg-red-500/20 text-red-500 px-3 py-1 rounded-full text-[10px] font-bold border border-red-500/30 uppercase tracking-widest">
                Sensor Idle
            </div>
        </div>

        <div class="flex flex-col items-center gap-4">
            <div id="crosshair" class="flex items-center justify-center">
                <div class="w-1 h-1 bg-blue-500 rounded-full"></div>
            </div>
            <p class="text-[10px] text-blue-400 font-bold uppercase tracking-widest">Horizon Center</p>
        </div>

        <div class="grid grid-cols-3 gap-3 pointer-events-auto">
            <div class="hud-glass p-4 rounded-2xl">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Pitch</p>
                <p id="pitchVal" class="text-xl font-black mono text-blue-400">0.0°</p>
            </div>
            <div class="hud-glass p-4 rounded-2xl">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Roll</p>
                <p id="rollVal" class="text-xl font-black mono text-emerald-400">0.0°</p>
            </div>
            <div class="hud-glass p-4 rounded-2xl">
                <p class="text-[10px] text-slate-400 font-bold uppercase mb-1">Yaw</p>
                <p id="yawVal" class="text-xl font-black mono text-amber-400">0.0°</p>
            </div>
        </div>
    </div>

    <!-- Start Button -->
    <div id="overlay" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-950/80 backdrop-blur-md">
        <div class="text-center">
            <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-12 py-6 rounded-3xl font-black text-2xl shadow-2xl transition-all active:scale-95">
                ACTIVATE SENSORS
            </button>
            <p class="mt-6 text-slate-400 text-sm font-medium">Hold phone upright (Portrait) then tap start</p>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, phoneGroup;
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'vphone-final';

        function createScene() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Horizon Grid
            const grid = new THREE.GridHelper(20, 20, 0x1e293b, 0x1e293b);
            grid.position.y = -4;
            scene.add(grid);

            // Lighting
            scene.add(new THREE.AmbientLight(0xffffff, 0.5));
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 7);
            scene.add(light);

            // The Phone
            phoneGroup = new THREE.Group();
            
            // Chassis
            const chassis = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 4.8, 0.28),
                new THREE.MeshStandardMaterial({ color: 0x334155, metalness: 0.8, roughness: 0.2 })
            );
            phoneGroup.add(chassis);

            // Screen
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.25, 4.65),
                new THREE.MeshStandardMaterial({ color: 0x020617, emissive: 0x3b82f6, emissiveIntensity: 0.1 })
            );
            screen.position.z = 0.141;
            phoneGroup.add(screen);

            // Buttons (RIGHT SIDE)
            const btnMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const pwr = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.4, 0.1), btnMat);
            pwr.position.set(1.22, 0.4, 0); phoneGroup.add(pwr);
            const vol = new THREE.Mesh(new THREE.BoxGeometry(0.06, 0.8, 0.1), btnMat);
            vol.position.set(1.22, 1.2, 0); phoneGroup.add(vol);

            // Logo on screen
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = '#3b82f6'; ctx.font = 'bold 60px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('V-PHONE', 256, 512);
            const tex = new THREE.CanvasTexture(canvas);
            const overlay = new THREE.Mesh(new THREE.PlaneGeometry(2.25, 4.65), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
            overlay.position.z = 0.142;
            phoneGroup.add(overlay);

            scene.add(phoneGroup);
            camera.position.z = 10;
        }

        function animate() {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        }

        async function initSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const res = await DeviceOrientationEvent.requestPermission();
                    if (res !== 'granted') return;
                } catch (e) { console.error(e); }
            }

            window.addEventListener('deviceorientation', (e) => {
                const alpha = e.alpha || 0;
                const beta = e.beta || 0;
                const gamma = e.gamma || 0;

                // MAPPING FROM YOUR 6-POINT DATA:
                // Your data shows:
                // Bottom Up (Standard) = Beta 1.3 (Near 0)
                // Front Up (Flat) = Beta -82 (Near -90)
                // Top Up (Upside down) = Beta 169 (Near 180)
                
                // We use ZXY Euler order which is best for phone sensors
                const radB = THREE.MathUtils.degToRad(beta);
                const radG = THREE.MathUtils.degToRad(gamma);
                const radA = THREE.MathUtils.degToRad(alpha);

                // Apply the rotations to the phone group
                // Note: beta maps to X rotation, gamma to Y, alpha to Z
                phoneGroup.rotation.set(radB, radA, -radG, 'ZXY');

                // UI Updates
                document.getElementById('pitchVal').innerText = beta.toFixed(1) + '°';
                document.getElementById('rollVal').innerText = gamma.toFixed(1) + '°';
                document.getElementById('yawVal').innerText = alpha.toFixed(1) + '°';
                
                const badge = document.getElementById('statusBadge');
                badge.innerText = "SENSORS ACTIVE";
                badge.className = "bg-emerald-500/20 text-emerald-500 px-3 py-1 rounded-full text-[10px] font-bold border border-emerald-500/30 uppercase tracking-widest";
            });

            document.getElementById('overlay').classList.add('hidden');
        }

        window.onload = () => {
            createScene();
            animate();
            document.getElementById('startBtn').onclick = initSensors;
        };

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
