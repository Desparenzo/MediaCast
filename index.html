```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gyro Cube Tester</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #0f172a;
            font-family: system-ui, -apple-system, sans-serif;
        }
        canvas {
            display: block;
        }
        .glass {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .mono { font-family: 'ui-monospace', 'SFMono-Regular', monospace; }
        
        /* Ensure the UI doesn't interfere with the 3D interaction */
        .no-pointer { pointer-events: none; }
        .yes-pointer { pointer-events: auto; }
    </style>
</head>
<body class="text-white">

    <!-- Top Branding -->
    <div class="fixed top-0 left-0 w-full p-6 no-pointer z-10">
        <header class="flex justify-between items-center yes-pointer">
            <div>
                <h1 class="text-xl font-black tracking-tighter text-blue-400 uppercase">Cube Gyro Labs</h1>
                <p class="text-slate-500 text-[10px] font-bold tracking-widest uppercase">Visual Calibration v2.0</p>
            </div>
            <button id="permissionBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-full text-xs font-bold transition-all shadow-xl hidden">
                START SENSORS
            </button>
        </header>
    </div>

    <!-- Main 3D Stage -->
    <div id="canvas-container" class="fixed inset-0"></div>

    <!-- Data Dashboard at Bottom -->
    <div class="fixed bottom-0 left-0 w-full p-4 md:p-6 no-pointer z-10">
        <div class="max-w-5xl mx-auto grid grid-cols-3 gap-2 md:gap-4 yes-pointer">
            
            <!-- Pitch Panel -->
            <div class="glass p-3 md:p-4 rounded-xl border-b-2 border-blue-500">
                <div class="text-[10px] font-black text-blue-400 uppercase tracking-tighter mb-1">Pitch (β)</div>
                <div class="flex items-center justify-between">
                    <span id="pitchVal" class="text-xl md:text-3xl font-black mono text-white">0.0°</span>
                    <span class="hidden md:block text-[10px] text-slate-500 mono">X-AXIS</span>
                </div>
            </div>

            <!-- Roll Panel -->
            <div class="glass p-3 md:p-4 rounded-xl border-b-2 border-emerald-500">
                <div class="text-[10px] font-black text-emerald-400 uppercase tracking-tighter mb-1">Roll (γ)</div>
                <div class="flex items-center justify-between">
                    <span id="rollVal" class="text-xl md:text-3xl font-black mono text-white">0.0°</span>
                    <span class="hidden md:block text-[10px] text-slate-500 mono">Y-AXIS</span>
                </div>
            </div>

            <!-- Yaw Panel -->
            <div class="glass p-3 md:p-4 rounded-xl border-b-2 border-amber-500">
                <div class="text-[10px] font-black text-amber-400 uppercase tracking-tighter mb-1">Yaw (α)</div>
                <div class="flex items-center justify-between">
                    <span id="yawVal" class="text-xl md:text-3xl font-black mono text-white">0.0°</span>
                    <span class="hidden md:block text-[10px] text-slate-500 mono">Z-AXIS</span>
                </div>
            </div>

        </div>
    </div>

    <script>
        let scene, camera, renderer, cube, axesHelper;
        let sensorActive = false;

        function createFaceTexture(number, color, label) {
            const canvas = document.createElement('canvas');
            canvas.width = 512;
            canvas.height = 512;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = color;
            ctx.fillRect(0, 0, 512, 512);

            ctx.strokeStyle = 'rgba(255,255,255,0.5)';
            ctx.lineWidth = 20;
            ctx.strokeRect(10, 10, 492, 492);

            ctx.fillStyle = 'white';
            ctx.font = 'bold 350px monospace';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(number, 256, 256);

            ctx.font = 'bold 40px sans-serif';
            ctx.fillText(label, 256, 460);

            const texture = new THREE.CanvasTexture(canvas);
            return new THREE.MeshPhongMaterial({ 
                map: texture, 
                shininess: 60,
                specular: 0x444444
            });
        }

        function init3D() {
            scene = new THREE.Scene();
            // Background gradient simulation
            scene.fog = new THREE.FogExp2(0x0f172a, 0.05);

            camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
            
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            const geometry = new THREE.BoxGeometry(3.2, 3.2, 3.2);
            
            const materials = [
                createFaceTexture('1', '#3b82f6', 'RIGHT (+X)'), 
                createFaceTexture('2', '#ef4444', 'LEFT (-X)'),
                createFaceTexture('3', '#10b981', 'TOP (+Y)'),
                createFaceTexture('4', '#f59e0b', 'BOTTOM (-Y)'),
                createFaceTexture('5', '#8b5cf6', 'FRONT (+Z)'),
                createFaceTexture('6', '#ec4899', 'BACK (-Z)')
            ];

            cube = new THREE.Mesh(geometry, materials);
            scene.add(cube);

            // Subtle glow edges
            const edges = new THREE.EdgesGeometry(geometry);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0xffffff, transparent: true, opacity: 0.3 }));
            cube.add(line);

            axesHelper = new THREE.AxesHelper(5);
            scene.add(axesHelper);

            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const spotLight = new THREE.SpotLight(0xffffff, 0.8);
            spotLight.position.set(10, 20, 10);
            scene.add(spotLight);

            // Centered camera position for better mobile viewing
            camera.position.set(6, 4, 10);
            camera.lookAt(0, 0, 0);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            if (!sensorActive) {
                // Auto-drift when no sensor
                cube.rotation.y += 0.004;
                cube.rotation.x += 0.002;
            }
            
            renderer.render(scene, camera);
        }

        function updateOrientation(alpha, beta, gamma) {
            sensorActive = true;
            const degToRad = Math.PI / 180;
            
            // Standard DeviceOrientation Euler Order
            cube.rotation.set(
                beta * degToRad,
                alpha * degToRad,
                -gamma * degToRad,
                'ZXY'
            );

            document.getElementById('pitchVal').innerText = beta.toFixed(1) + '°';
            document.getElementById('rollVal').innerText = gamma.toFixed(1) + '°';
            document.getElementById('yawVal').innerText = alpha.toFixed(1) + '°';
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const response = await DeviceOrientationEvent.requestPermission();
                    if (response === 'granted') {
                        startListening();
                    }
                } catch (e) {
                    console.error(e);
                }
            } else {
                startListening();
            }
        }

        function startListening() {
            window.addEventListener('deviceorientation', (e) => {
                if (e.alpha !== null) {
                    updateOrientation(e.alpha, e.beta, e.gamma);
                }
            });
            document.getElementById('permissionBtn').classList.add('hidden');
        }

        window.onload = () => {
            init3D();
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                document.getElementById('permissionBtn').classList.remove('hidden');
                document.getElementById('permissionBtn').addEventListener('click', requestPermission);
            } else {
                startListening();
            }
        };
    </script>
</body>
</html>
