```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Standard Calibration</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #f1f5f9; font-family: sans-serif; }
        .ui-card { background: white; border-radius: 1rem; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body>

    <!-- Simple Top UI -->
    <div id="diagBox" class="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-30 ui-card p-6 border border-slate-200 hidden">
        <div class="text-center">
            <p id="stepCounter" class="text-blue-600 font-bold text-xs uppercase tracking-widest mb-1">Step 1 of 6</p>
            <h2 id="targetSide" class="text-2xl font-bold text-slate-800 mb-2 uppercase">Screen Facing Up</h2>
            <p id="instruction" class="text-slate-500 text-sm mb-6 italic">Match your phone to the model below.</p>
            
            <button id="captureBtn" class="w-full bg-slate-900 text-white py-4 rounded-xl font-bold uppercase tracking-tight active:scale-95 transition-transform">Capture Direction</button>
        </div>
    </div>

    <!-- Start Overlay -->
    <div id="initOverlay" class="fixed inset-0 z-50 flex items-center justify-center bg-white/80 backdrop-blur-sm">
        <button id="startBtn" class="bg-blue-600 text-white px-10 py-5 rounded-2xl font-bold text-xl shadow-xl">START TEST</button>
    </div>

    <!-- Results -->
    <div id="resultModal" class="fixed inset-0 z-50 bg-slate-50 flex items-center justify-center p-6 hidden">
        <div class="w-full max-w-lg bg-white p-8 rounded-3xl shadow-2xl border border-slate-200">
            <h2 class="text-xl font-bold mb-4 text-slate-800">Calibration Data</h2>
            <textarea id="output" class="w-full h-64 p-4 bg-slate-50 border border-slate-200 rounded-xl font-mono text-[10px] mb-4" readonly></textarea>
            <button id="copyBtn" class="w-full bg-blue-600 text-white py-4 rounded-xl font-bold uppercase">Copy Result</button>
        </div>
    </div>

    <div id="canvas-container"></div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let sensorData = { a: 0, b: 0, g: 0 };
        let logs = [];
        
        const steps = [
            { id: 1, side: "FRONT UP", desc: "Lay phone flat, screen facing ceiling", rot: {x: -Math.PI/2, y: 0, z: 0} },
            { id: 2, side: "BACK UP", desc: "Lay phone flat, back facing ceiling", rot: {x: Math.PI/2, y: 0, z: 0} },
            { id: 3, side: "TOP UP", desc: "Top edge facing ceiling (upside down)", rot: {x: -Math.PI, y: 0, z: 0} },
            { id: 4, side: "BOTTOM UP", desc: "Bottom edge facing ceiling (vertical)", rot: {x: 0, y: 0, z: 0} },
            { id: 5, side: "LEFT UP", desc: "Left edge facing ceiling (landscape)", rot: {x: 0, y: 0, z: -Math.PI/2} },
            { id: 6, side: "RIGHT UP", desc: "Right edge (buttons) facing ceiling", rot: {x: 0, y: 0, z: Math.PI/2} }
        ];
        let currentStepIdx = 0;

        function createStandardPhone() {
            const group = new THREE.Group();
            
            // Solid Phone Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 4.8, 0.3),
                new THREE.MeshStandardMaterial({ color: 0x334155, roughness: 0.5, metalness: 0.2 })
            );
            group.add(body);

            // Screen Area
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.2, 4.6),
                new THREE.MeshStandardMaterial({ color: 0x0f172a })
            );
            screen.position.z = 0.151;
            group.add(screen);

            // Buttons (Right Side Only)
            const btnMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const pwr = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.4, 0.1), btnMat);
            pwr.position.set(1.2, 0.5, 0); group.add(pwr);
            const vol = new THREE.Mesh(new THREE.BoxGeometry(0.08, 0.8, 0.1), btnMat);
            vol.position.set(1.2, 1.4, 0); group.add(vol);

            // Function to add small edge labels
            const addLabel = (text, pos, rot) => {
                const canvas = document.createElement('canvas');
                canvas.width = 256; canvas.height = 64;
                const ctx = canvas.getContext('2d');
                ctx.fillStyle = "#3b82f6";
                ctx.fillRect(0, 0, 256, 64);
                ctx.fillStyle = "white";
                ctx.font = "bold 32px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(text, 128, 44);
                
                const tex = new THREE.CanvasTexture(canvas);
                const plane = new THREE.Mesh(new THREE.PlaneGeometry(1.2, 0.3), new THREE.MeshBasicMaterial({ map: tex }));
                plane.position.set(pos.x, pos.y, pos.z);
                plane.rotation.set(rot.x, rot.y, rot.z);
                group.add(plane);
            };

            // Simplified naming for all 6 sides
            addLabel("1: FRONT", {x:0, y:0, z:0.16}, {x:0, y:0, z:0}); 
            addLabel("2: BACK", {x:0, y:0, z:-0.16}, {x:0, y:Math.PI, z:0});
            addLabel("3: TOP", {x:0, y:2.41, z:0}, {x:-Math.PI/2, y:0, z:0});
            addLabel("4: BOTTOM", {x:0, y:-2.41, z:0}, {x:Math.PI/2, y:0, z:0});
            addLabel("5: LEFT", {x:-1.21, y:0, z:0}, {x:0, y:-Math.PI/2, z:0});
            addLabel("6: RIGHT", {x:1.21, y:0, z:0}, {x:0, y:Math.PI/2, z:0});

            return group;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            phoneGroup = createStandardPhone();
            scene.add(phoneGroup);
            
            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 0.5);
            sun.position.set(5, 5, 5);
            scene.add(sun);

            camera.position.set(0, 0, 10);

            function animate() {
                requestAnimationFrame(animate);
                if (currentStepIdx < steps.length) {
                    const target = steps[currentStepIdx].rot;
                    // Normal, steady rotation speed
                    phoneGroup.rotation.x += (target.x - phoneGroup.rotation.x) * 0.05;
                    phoneGroup.rotation.y += (target.y - phoneGroup.rotation.y) * 0.05;
                    phoneGroup.rotation.z += (target.z - phoneGroup.rotation.z) * 0.05;
                }
                renderer.render(scene, camera);
            }
            animate();
        }

        async function startSensors() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }
            window.addEventListener('deviceorientation', (e) => {
                sensorData = { a: e.alpha || 0, b: e.beta || 0, g: e.gamma || 0 };
            });
            document.getElementById('initOverlay').classList.add('hidden');
            document.getElementById('diagBox').classList.remove('hidden');
        }

        document.getElementById('captureBtn').onclick = () => {
            logs.push({
                intendedSideUp: steps[currentStepIdx].side,
                alpha: sensorData.a,
                beta: sensorData.b,
                gamma: sensorData.g
            });

            currentStepIdx++;
            if (currentStepIdx < steps.length) {
                document.getElementById('stepCounter').innerText = `STEP ${currentStepIdx + 1} OF 6`;
                document.getElementById('targetSide').innerText = steps[currentStepIdx].side;
                document.getElementById('instruction').innerText = steps[currentStepIdx].desc;
            } else {
                document.getElementById('diagBox').classList.add('hidden');
                document.getElementById('resultModal').classList.remove('hidden');
                document.getElementById('output').value = JSON.stringify(logs, null, 2);
            }
        };

        window.onload = init3D;
        document.getElementById('startBtn').onclick = startSensors;
        document.getElementById('copyBtn').onclick = () => {
            document.getElementById('output').select();
            document.execCommand('copy');
            document.getElementById('copyBtn').innerText = "COPIED!";
        };
    </script>
</body>
</html>
