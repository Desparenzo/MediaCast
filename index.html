<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Final Calibrated V-Phone</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #020617; font-family: system-ui, sans-serif; }
        canvas { display: block; }
        .glass { background: rgba(15, 23, 42, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .mono { font-family: ui-monospace, monospace; }
    </style>
</head>
<body class="text-white">

    <div class="fixed top-0 left-0 w-full p-6 z-20 pointer-events-none">
        <div class="flex justify-between items-start pointer-events-auto">
            <div>
                <h1 class="text-2xl font-black tracking-tighter text-blue-500 uppercase leading-none italic">V-Phone Final</h1>
                <p id="status" class="text-slate-500 text-[10px] font-bold tracking-widest uppercase mt-2">Driver: 6-Point Validated</p>
            </div>
            <button id="startBtn" class="bg-blue-600 hover:bg-blue-500 text-white px-6 py-2 rounded-full text-xs font-bold transition-all shadow-lg shadow-blue-900/40">START SENSORS</button>
        </div>
    </div>

    <div id="canvas-container" class="fixed inset-0"></div>

    <div class="fixed bottom-0 left-0 w-full p-6 z-20 pointer-events-none">
        <div class="max-w-4xl mx-auto flex flex-col gap-4">
            <div class="grid grid-cols-3 gap-4 pointer-events-auto">
                <div class="glass p-4 rounded-2xl border-b-2 border-blue-500/50">
                    <div class="text-[9px] font-black text-blue-400 uppercase mb-1 tracking-widest">Pitch</div>
                    <div id="ui-pitch" class="text-xl font-bold mono">0.0°</div>
                </div>
                <div class="glass p-4 rounded-2xl border-b-2 border-emerald-500/50">
                    <div class="text-[9px] font-black text-emerald-400 uppercase mb-1 tracking-widest">Roll</div>
                    <div id="ui-roll" class="text-xl font-bold mono">0.0°</div>
                </div>
                <div class="glass p-4 rounded-2xl border-b-2 border-amber-500/50">
                    <div class="text-[9px] font-black text-amber-400 uppercase mb-1 tracking-widest">Yaw</div>
                    <div id="ui-yaw" class="text-xl font-bold mono">0.0°</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let isSensorActive = false;
        
        // This is the "World" correction. Standard browser math wants the phone flat.
        // We add a 90-degree offset so that "Upright" (Step 4 in your data) looks correct.
        const sensorToWorldOffset = new THREE.Quaternion().setFromEuler(new THREE.Euler(Math.PI / 2, 0, 0));

        function createPhone() {
            const group = new THREE.Group();
            
            // Body
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.4, 4.8, 0.25),
                new THREE.MeshStandardMaterial({ color: 0x0f172a, metalness: 0.8, roughness: 0.2 })
            );
            group.add(body);

            // Screen
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.28, 4.68),
                new THREE.MeshStandardMaterial({ color: 0x000000, emissive: 0x3b82f6, emissiveIntensity: 0.2 })
            );
            screen.position.z = 0.13;
            group.add(screen);

            // Labels
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 1024;
            const ctx = canvas.getContext('2d');
            ctx.fillStyle = "#3b82f6"; ctx.font = "bold 60px sans-serif"; ctx.textAlign = "center";
            ctx.fillText("V-PHONE", 256, 512);
            ctx.font = "bold 40px sans-serif"; ctx.fillText("▲ TOP ▲", 256, 100);
            ctx.fillText("▼ BOTTOM ▼", 256, 950);
            
            const tex = new THREE.CanvasTexture(canvas);
            const overlay = new THREE.Mesh(new THREE.PlaneGeometry(2.28, 4.68), new THREE.MeshBasicMaterial({ map: tex, transparent: true }));
            overlay.position.z = 0.131;
            group.add(overlay);

            // Back camera to identify the back
            const cam = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.6, 0.1), new THREE.MeshStandardMaterial({color: 0x000000}));
            cam.position.set(-0.6, 1.8, -0.13);
            group.add(cam);

            return group;
        }

        function init3D() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            phoneGroup = createPhone();
            scene.add(phoneGroup);

            scene.add(new THREE.AmbientLight(0xffffff, 0.6));
            const light = new THREE.DirectionalLight(0xffffff, 0.8);
            light.position.set(5, 10, 7);
            scene.add(light);

            camera.position.set(0, 0, 10);
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            if (!isSensorActive) {
                phoneGroup.rotation.y += 0.01;
            }
            renderer.render(scene, camera);
        }

        function handleOrientation(e) {
            isSensorActive = true;
            
            // Convert to Radians
            const alpha = THREE.MathUtils.degToRad(e.alpha || 0);
            const beta = THREE.MathUtils.degToRad(e.beta || 0);
            const gamma = THREE.MathUtils.degToRad(e.gamma || 0);

            // Based on your 6-point test:
            // Beta is Pitch (X), Gamma is Roll (Y), Alpha is Yaw (Z)
            // Use 'ZXY' order which is the standard for mobile orientation data
            const euler = new THREE.Euler(beta, alpha, -gamma, 'ZXY');
            
            // Create quaternion from the device data
            const deviceQuat = new THREE.Quaternion().setFromEuler(euler);
            
            // Combine with the offset to make Portrait = Upright
            phoneGroup.quaternion.copy(sensorToWorldOffset).multiply(deviceQuat);

            // Update UI
            document.getElementById('ui-pitch').innerText = (e.beta || 0).toFixed(1) + '°';
            document.getElementById('ui-roll').innerText = (e.gamma || 0).toFixed(1) + '°';
            document.getElementById('ui-yaw').innerText = (e.alpha || 0).toFixed(1) + '°';
        }

        async function start() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res !== 'granted') return;
            }
            window.addEventListener('deviceorientation', handleOrientation);
            document.getElementById('startBtn').classList.add('hidden');
        }

        window.onload = init3D;
        document.getElementById('startBtn').onclick = start;

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
