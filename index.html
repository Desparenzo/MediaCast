<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GridNavigator - Tactical Map</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #050505;
            color: #00ff41;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
            touch-action: none;
        }
        .crt-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
            background-size: 100% 2px, 3px 100%;
            pointer-events: none;
            z-index: 50;
        }
        #map-canvas {
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
        }
        .ui-panel {
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid #00ff41;
            box-shadow: 0 0 15px rgba(0, 255, 65, 0.2);
            backdrop-filter: blur(5px);
        }
        .btn-action {
            background: #00ff41;
            color: #000;
            font-weight: bold;
            transition: all 0.2s;
        }
        .btn-action:active {
            transform: scale(0.95);
            filter: brightness(0.8);
        }
    </style>
</head>
<body class="h-screen w-screen flex flex-col">
    <div class="crt-overlay"></div>

    <!-- Top Status HUD -->
    <div class="ui-panel m-2 p-3 rounded flex justify-between items-center text-[10px] z-10">
        <div>
            <span class="opacity-50 text-white">CURRENT_POS:</span>
            <span id="pos-display">WAITING...</span>
        </div>
        <div id="gps-indicator" class="flex items-center gap-1">
            <div class="w-2 h-2 rounded-full bg-red-500 shadow-[0_0_5px_red]"></div>
            GPS_LOST
        </div>
    </div>

    <!-- Map Area -->
    <div class="relative flex-grow overflow-hidden m-2 border border-[#00ff41]/30 rounded">
        <canvas id="map-canvas"></canvas>
        
        <!-- Target Info Overlay -->
        <div id="target-hud" class="absolute bottom-4 left-4 ui-panel p-2 rounded text-[10px] hidden">
            <div class="text-white opacity-50 mb-1">TARGET_LOCK:</div>
            <div id="target-coords" class="mb-2">---</div>
            <div class="flex gap-4">
                <div>Δ_LAT: <span id="dist-lat">0</span></div>
                <div>Δ_LNG: <span id="dist-lng">0</span></div>
            </div>
        </div>
    </div>

    <!-- Controls -->
    <div class="p-2 flex flex-col gap-2 z-10">
        <div class="flex gap-2">
            <input type="text" id="find-input" placeholder="PASTE_LAT_LONG" 
                class="flex-grow bg-black border border-[#00ff41] p-3 text-[#00ff41] placeholder-[#00ff41]/30 text-xs rounded focus:outline-none">
            <button id="find-btn" class="btn-action px-6 py-3 rounded text-xs">FIND</button>
        </div>
        <button id="copy-btn" class="btn-action w-full py-4 rounded text-sm">COPY MY COORDS</button>
    </div>

    <script>
        const canvas = document.getElementById('map-canvas');
        const ctx = canvas.getContext('2d');
        const posDisplay = document.getElementById('pos-display');
        const gpsIndicator = document.getElementById('gps-indicator');
        const targetHud = document.getElementById('target-hud');

        let myPos = { lat: 0, lng: 0 };
        let originPos = null; // Where we started
        let targetPos = null;
        let deviceHeading = 0;
        let points = []; // Trail

        function init() {
            window.addEventListener('resize', resize);
            resize();
            startTracking();
            animate();
        }

        function resize() {
            canvas.width = canvas.clientWidth;
            canvas.height = canvas.clientHeight;
        }

        function startTracking() {
            if (!navigator.geolocation) return;

            navigator.geolocation.watchPosition(
                (pos) => {
                    myPos.lat = pos.coords.latitude;
                    myPos.lng = pos.coords.longitude;
                    
                    if (!originPos) {
                        originPos = { ...myPos };
                    }

                    points.push({ ...myPos });
                    if (points.length > 500) points.shift();

                    posDisplay.textContent = `${myPos.lat.toFixed(5)}, ${myPos.lng.toFixed(5)}`;
                    gpsIndicator.innerHTML = `<div class="w-2 h-2 rounded-full bg-[#00ff41] shadow-[0_0_5px_#00ff41]"></div> GPS_SYNC`;
                    
                    if (targetPos) updateTargetHud();
                },
                (err) => console.error(err),
                { enableHighAccuracy: true }
            );

            // Compass
            if (window.DeviceOrientationEvent) {
                window.addEventListener('deviceorientationabsolute', (e) => {
                    deviceHeading = e.webkitCompassHeading || (360 - e.alpha);
                });
            }
        }

        function updateTargetHud() {
            targetHud.classList.remove('hidden');
            const dLat = targetPos.lat - myPos.lat;
            const dLng = targetPos.lng - myPos.lng;
            document.getElementById('target-coords').textContent = `${targetPos.lat.toFixed(5)}, ${targetPos.lng.toFixed(5)}`;
            document.getElementById('dist-lat').textContent = dLat.toFixed(5);
            document.getElementById('dist-lng').textContent = dLng.toFixed(5);
        }

        document.getElementById('copy-btn').addEventListener('click', () => {
            const str = `${myPos.lat}_${myPos.lng}`;
            const el = document.createElement('textarea');
            el.value = str;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("COORDINATES SAVED TO CLIPBOARD");
        });

        document.getElementById('find-btn').addEventListener('click', () => {
            const input = document.getElementById('find-input').value;
            if (!input.includes('_')) return;
            const parts = input.split('_');
            targetPos = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
            originPos = { ...myPos }; // Reset origin to current spot when finding new
            updateTargetHud();
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Map Config
            const scale = 50000; // Zoom level (pixels per coordinate degree)
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            function toCanvas(lat, lng) {
                return {
                    x: centerX + (lng - myPos.lng) * scale,
                    y: centerY - (lat - myPos.lat) * scale // Y is inverted in screen coords
                };
            }

            // 1. Draw Grid
            ctx.strokeStyle = '#00ff41';
            ctx.lineWidth = 0.5;
            ctx.globalAlpha = 0.1;
            const gridSize = 40;
            const offsetX = (myPos.lng * scale) % gridSize;
            const offsetY = (myPos.lat * scale) % gridSize;

            for(let i = -gridSize; i < canvas.width + gridSize; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i - offsetX, 0);
                ctx.lineTo(i - offsetX, canvas.height);
                ctx.stroke();
            }
            for(let j = -gridSize; j < canvas.height + gridSize; j += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, j + offsetY);
                ctx.lineTo(canvas.width, j + offsetY);
                ctx.stroke();
            }
            ctx.globalAlpha = 1.0;

            // 2. Draw Connection Path
            if (targetPos && originPos) {
                const start = toCanvas(originPos.lat, originPos.lng);
                const end = toCanvas(targetPos.lat, targetPos.lng);

                // Line from Start to End
                ctx.setLineDash([5, 5]);
                ctx.strokeStyle = '#555';
                ctx.beginPath();
                ctx.moveTo(start.x, start.y);
                ctx.lineTo(end.x, end.y);
                ctx.stroke();
                ctx.setLineDash([]);

                // Draw Origin Marker
                ctx.fillStyle = '#fff';
                ctx.beginPath();
                ctx.arc(start.x, start.y, 4, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillText("ORIGIN", start.x + 8, start.y);

                // Draw Target Marker
                ctx.fillStyle = '#f00';
                ctx.shadowBlur = 10;
                ctx.shadowColor = 'red';
                ctx.beginPath();
                ctx.arc(end.x, end.y, 6, 0, Math.PI * 2);
                ctx.fill();
                ctx.fillText("TARGET", end.x + 10, end.y);
                ctx.shadowBlur = 0;
            }

            // 3. Draw Player Trail
            if (points.length > 1) {
                ctx.strokeStyle = '#00ff41';
                ctx.globalAlpha = 0.4;
                ctx.beginPath();
                const first = toCanvas(points[0].lat, points[0].lng);
                ctx.moveTo(first.x, first.y);
                for (let p of points) {
                    const c = toCanvas(p.lat, p.lng);
                    ctx.lineTo(c.x, c.y);
                }
                ctx.stroke();
                ctx.globalAlpha = 1.0;
            }

            // 4. Draw Player (Red Arrow)
            ctx.save();
            ctx.translate(centerX, centerY);
            ctx.rotate((deviceHeading * Math.PI) / 180);
            
            ctx.fillStyle = '#ff3333';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3333';
            ctx.beginPath();
            ctx.moveTo(0, -12); // Tip
            ctx.lineTo(8, 8);
            ctx.lineTo(0, 4);
            ctx.lineTo(-8, 8);
            ctx.closePath();
            ctx.fill();
            ctx.restore();

            requestAnimationFrame(animate);
        }

        window.onload = init;
    </script>
</body>
</html>
