<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR Standing Viewport</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', monospace; }
        canvas { display: block; }
        #ui {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; display: flex; flex-direction: column; align-items: center;
        }
        .overlay-btn {
            pointer-events: auto; margin-top: 40vh; padding: 20px 40px;
            background: rgba(0, 255, 0, 0.1); border: 2px solid #0f0;
            color: #0f0; font-weight: bold; text-transform: uppercase; letter-spacing: 2px;
        }
        #hud {
            position: absolute; bottom: 20px; left: 20px; color: #0f0; font-size: 10px;
            background: rgba(0,20,0,0.8); padding: 10px; border: 1px solid #050;
        }
        #reticle {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; border: 1px solid rgba(0, 255, 0, 0.3); border-radius: 50%;
        }
        #reticle::after { content: ''; position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: #0f0; border-radius: 50%; transform: translate(-50%, -50%); }
    </style>
</head>
<body>

    <div id="ui">
        <div id="reticle"></div>
        <button id="start-btn" class="overlay-btn">Calibrate Upright View</button>
        <div id="hud">READY FOR SYNC</div>
    </div>

    <script>
        let scene, camera, renderer;
        let sensor = { alpha: 0, beta: 0, gamma: 0, heading: 0 };
        const eyeHeight = 1.65;

        // Mathematical constants for the standing orientation fix
        const q_world = new THREE.Quaternion(-Math.sqrt(0.5), 0, 0, Math.sqrt(0.5)); // Rotate world to match upright phone
        const q_sensor = new THREE.Quaternion();
        const q_final = new THREE.Quaternion();

        function init() {
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 500);
            camera.position.set(0, eyeHeight, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            buildTacticalRoom();
            
            document.getElementById('start-btn').addEventListener('click', start);
            window.addEventListener('resize', onResize);
            
            animate();
        }

        function buildTacticalRoom() {
            // High-visibility illuminated room
            const size = 16;
            const height = 6;

            // Floor & Ceiling
            const grid = new THREE.GridHelper(size, 16, 0x00ff00, 0x003300);
            scene.add(grid);
            const ceil = grid.clone();
            ceil.position.y = height;
            scene.add(ceil);

            // Wall Edges
            const boxGeom = new THREE.BoxGeometry(size, height, size);
            const edges = new THREE.EdgesGeometry(boxGeom);
            const lineMat = new THREE.LineBasicMaterial({ color: 0x00ff00, transparent: true, opacity: 0.6 });
            const room = new THREE.LineSegments(edges, lineMat);
            room.position.y = height / 2;
            scene.add(room);

            // Directional Pillars
            const pillarGeom = new THREE.CylinderGeometry(0.1, 0.1, height, 8);
            const pillarMat = new THREE.MeshBasicMaterial({ color: 0x00ff00 });
            
            const createPillar = (x, z, col) => {
                const p = new THREE.Mesh(pillarGeom, pillarMat.clone());
                p.material.color.setHex(col);
                p.position.set(x, height/2, z);
                scene.add(p);
            };

            createPillar(0, -7.5, 0xff0000); // NORTH - RED
            createPillar(7.5, 0, 0x00ff00);  // EAST - GREEN
            createPillar(-7.5, 0, 0x0000ff); // WEST - BLUE
            createPillar(0, 7.5, 0xffffff);  // SOUTH - WHITE
        }

        async function start() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                const response = await DeviceOrientationEvent.requestPermission();
                if (response !== 'granted') return;
            }
            
            window.addEventListener('deviceorientation', (e) => {
                sensor.alpha = e.alpha || 0;
                sensor.beta = e.beta || 0;
                sensor.gamma = e.gamma || 0;
                sensor.heading = e.webkitCompassHeading || e.alpha || 0;
                
                updateHUD();
            }, true);

            document.getElementById('start-btn').style.display = 'none';
        }

        function updateHUD() {
            document.getElementById('hud').innerHTML = `
                YAW: ${Math.round(sensor.alpha)}° | 
                PITCH: ${Math.round(sensor.beta)}° | 
                ROLL: ${Math.round(sensor.gamma)}°<br>
                ORIENTATION: PORTRAIT_FIXED
            `;
        }

        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);

            // STANDING UPRIGHT FIX:
            // We convert degrees to radians and use a specific Euler order 'YXZ'
            // To fix the "standing" inversion:
            // 1. Beta (Pitch) is typically 90 when standing.
            // 2. We use the absolute rotation of the device.
            
            const a = THREE.MathUtils.degToRad(sensor.alpha);
            const b = THREE.MathUtils.degToRad(sensor.beta);
            const g = THREE.MathUtils.degToRad(sensor.gamma);

            // Create quaternion from sensor data
            // We map: X=beta, Y=alpha, Z=-gamma
            const euler = new THREE.Euler(b, a, -g, 'YXZ');
            q_sensor.setFromEuler(euler);

            // Apply world-to-device coordinate transform
            // This aligns the "forward" vector to your eye level while standing
            camera.quaternion.copy(q_world);
            camera.quaternion.multiply(q_sensor);

            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
