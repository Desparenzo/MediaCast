```html
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Gyro Tracker Light</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; background: #ffffff; font-family: sans-serif; }
        canvas { display: block; }
        
        .ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            pointer-events: none;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            border: 1px solid #e5e7eb;
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            pointer-events: auto;
        }

        .controls {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 100%;
            text-align: center;
        }

        .btn-calibrate {
            background: #2563eb;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3);
            pointer-events: auto;
        }

        .btn-calibrate:hover {
            background: #1d4ed8;
            transform: scale(1.05);
        }

        .overlay-msg {
            position: fixed;
            inset: 0;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <div id="permissionModal" class="overlay-msg">
        <div class="text-center p-8">
            <h2 class="text-3xl font-black text-gray-900 mb-4">Start 3D View</h2>
            <p class="text-gray-500 mb-8 max-w-xs">Enable sensors to see the phone tilt in real-time on this white canvas.</p>
            <button onclick="requestPermission()" class="btn-calibrate !px-12 !text-lg">Enable Sensors</button>
        </div>
    </div>

    <div class="ui">
        <div class="glass-card">
            <h1 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4">Live Orientation</h1>
            <div class="space-y-2">
                <div class="flex justify-between gap-6">
                    <span class="text-xs font-bold text-blue-600">YAW</span>
                    <span id="val-a" class="font-mono text-sm">0.0°</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs font-bold text-green-600">PITCH</span>
                    <span id="val-b" class="font-mono text-sm">0.0°</span>
                </div>
                <div class="flex justify-between">
                    <span class="text-xs font-bold text-purple-600">ROLL</span>
                    <span id="val-g" class="font-mono text-sm">0.0°</span>
                </div>
            </div>
        </div>
    </div>

    <div class="controls">
        <button onclick="calibrate()" class="btn-calibrate">CALIBRATE (LAY FLAT)</button>
        <p class="mt-3 text-[10px] text-gray-400 font-bold uppercase tracking-widest">Screen up • Camera down</p>
    </div>

    <script>
        let scene, camera, renderer, phoneGroup;
        let offset = { alpha: 0, beta: 0, gamma: 0 };
        let current = { alpha: 0, beta: 0, gamma: 0 };

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0xffffff);

            camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 3, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            document.body.appendChild(renderer.domElement);

            // Bright Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambient);

            const sun = new THREE.DirectionalLight(0xffffff, 0.8);
            sun.position.set(5, 10, 5);
            sun.castShadow = true;
            scene.add(sun);

            // Phone Construction
            phoneGroup = new THREE.Group();

            // Main Frame (Silver/Metal)
            const body = new THREE.Mesh(
                new THREE.BoxGeometry(2.2, 4.2, 0.25),
                new THREE.MeshStandardMaterial({ color: 0xdddddd, metalness: 0.5, roughness: 0.2 })
            );
            body.castShadow = true;
            phoneGroup.add(body);

            // Screen (White Glossy)
            const screen = new THREE.Mesh(
                new THREE.PlaneGeometry(2.05, 4.05),
                new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.1, emissive: 0x111111 })
            );
            screen.position.z = 0.126;
            phoneGroup.add(screen);

            // Camera Lenses (Back)
            const cam = new THREE.Mesh(
                new THREE.CircleGeometry(0.15, 32),
                new THREE.MeshStandardMaterial({ color: 0x333333 })
            );
            cam.position.set(0.6, 1.6, -0.126);
            cam.rotation.y = Math.PI;
            phoneGroup.add(cam);

            scene.add(phoneGroup);

            // Floor Grid
            const grid = new THREE.GridHelper(40, 40, 0xcccccc, 0xeeeeee);
            grid.position.y = -2.5;
            scene.add(grid);

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });

            renderLoop();
        }

        function renderLoop() {
            requestAnimationFrame(renderLoop);
            if (phoneGroup) {
                const a = (current.alpha - offset.alpha) * (Math.PI / 180);
                const b = (current.beta - offset.beta) * (Math.PI / 180);
                const g = (current.gamma - offset.gamma) * (Math.PI / 180);
                phoneGroup.rotation.set(b, g, -a, 'YXZ');
            }
            renderer.render(scene, camera);
        }

        async function requestPermission() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const result = await DeviceOrientationEvent.requestPermission();
                if (result === 'granted') startSensors();
            } else {
                startSensors();
            }
        }

        function startSensors() {
            document.getElementById('permissionModal').style.display = 'none';
            window.addEventListener('deviceorientation', (e) => {
                current.alpha = e.alpha || 0;
                current.beta = e.beta || 0;
                current.gamma = e.gamma || 0;
                
                document.getElementById('val-a').innerText = current.alpha.toFixed(1) + "°";
                document.getElementById('val-b').innerText = current.beta.toFixed(1) + "°";
                document.getElementById('val-g').innerText = current.gamma.toFixed(1) + "°";
            });
        }

        function calibrate() {
            offset.alpha = current.alpha;
            offset.beta = current.beta;
            offset.gamma = current.gamma;
            
            const btn = document.querySelector('.btn-calibrate');
            btn.innerText = "CALIBRATED ✓";
            btn.style.background = "#10b981";
            setTimeout(() => {
                btn.innerText = "CALIBRATE (LAY FLAT)";
                btn.style.background = "#2563eb";
            }, 1500);
        }

        window.onload = init;
    </script>
</body>
</html>
